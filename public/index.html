<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG APK Apps — Android APK Store</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#F6F7FB;
  --white:#FFFFFF;
  --surface:#FFFFFF;
  --surface2:#F0F1F8;
  --indigo:#312E81;
  --indigo-mid:#4338CA;
  --indigo-light:#EEF2FF;
  --coral:#FF5C35;
  --coral-light:#FFF0ED;
  --teal:#0891B2;
  --teal-light:#E0F7FA;
  --amber:#D97706;
  --amber-light:#FFFBEB;
  --green:#059669;
  --green-light:#ECFDF5;
  --border:#E4E6F0;
  --border2:#CDD0E3;
  --text:#1A1B2E;
  --text2:#4B4E6B;
  --text3:#9395B0;
  --gold:#F59E0B;
  --shadow-sm:0 1px 4px rgba(30,27,75,.07);
  --shadow:0 4px 20px rgba(30,27,75,.10);
  --shadow-lg:0 12px 48px rgba(30,27,75,.16);
  --r:14px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer}
a{text-decoration:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

/* ═══ HEADER ════════════════════════════════════════════════════════════════ */
.header{
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  display:flex;align-items:center;gap:18px;
  height:64px;position:sticky;top:0;z-index:300;
  box-shadow:var(--shadow-sm);
}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-badge{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--indigo-mid) 0%,var(--coral) 100%);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:16px;font-weight:800;
  box-shadow:0 4px 12px rgba(99,102,241,.35);
  flex-shrink:0;
}
.logo-name{font-size:18px;font-weight:800;color:var(--indigo);letter-spacing:-.4px;white-space:nowrap}
.logo-name span{color:var(--coral)}

.search-wrap{flex:1;max-width:520px;position:relative;margin:0 auto}
.search-wrap .si{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.search-wrap input{
  width:100%;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:50px;
  padding:10px 40px 10px 44px;
  font-size:14px;outline:none;
  color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:500;
  transition:all .2s;
}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--indigo-mid);background:#fff;box-shadow:0 0 0 4px rgba(99,102,241,.1)}
.search-wrap .clear-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:14px;display:none;padding:4px;line-height:1;cursor:pointer}
.search-wrap input:not(:placeholder-shown)~.clear-btn{display:block}

.header-nav{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-link{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--text2);transition:all .15s;border:none;background:none}
.nav-link:hover{background:var(--indigo-light);color:var(--indigo-mid)}
.nav-cta{
  display:flex;align-items:center;gap:6px;
  padding:9px 20px;border-radius:50px;
  background:var(--indigo);color:#fff;
  font-size:13.5px;font-weight:700;
  border:none;transition:all .2s;
  box-shadow:0 4px 14px rgba(49,46,129,.3);
}
.nav-cta:hover{background:var(--indigo-mid);transform:translateY(-1px);box-shadow:0 6px 20px rgba(49,46,129,.35)}

/* ═══ CATEGORY NAV BAR ══════════════════════════════════════════════════════ */
.cat-bar{
  background:var(--white);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  display:flex;align-items:center;gap:4px;
  overflow-x:auto;white-space:nowrap;
  scrollbar-width:none;
  position:sticky;top:64px;z-index:200;
  box-shadow:var(--shadow-sm);
}
.cat-bar::-webkit-scrollbar{display:none}
.cat-tab{
  display:inline-flex;align-items:center;gap:6px;
  padding:14px 16px;
  font-size:13px;font-weight:600;color:var(--text2);
  border:none;background:none;
  cursor:pointer;transition:all .15s;
  border-bottom:2px solid transparent;
  flex-shrink:0;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.cat-tab:hover{color:var(--indigo-mid)}
.cat-tab.active{color:var(--indigo-mid);border-bottom-color:var(--indigo-mid);font-weight:700}
.cat-tab i{font-size:14px}

/* ═══ MAIN ══════════════════════════════════════════════════════════════════ */
.main{max-width:1200px;margin:0 auto;padding:32px 28px 80px}

/* ═══ HERO ══════════════════════════════════════════════════════════════════ */
.hero{
  border-radius:24px;
  overflow:hidden;
  margin-bottom:36px;
  position:relative;
  background:var(--indigo);
  display:grid;grid-template-columns:1fr 360px;
  min-height:220px;
}
.hero-left{
  padding:44px 48px;
  position:relative;z-index:1;
}
.hero-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.9);
  font-size:11px;font-weight:700;
  padding:5px 14px;border-radius:50px;
  letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:16px;
}
.hero h1{
  font-size:34px;font-weight:800;
  color:#fff;line-height:1.15;
  letter-spacing:-.6px;margin-bottom:12px;
}
.hero h1 mark{
  background:none;
  color:var(--coral);
  -webkit-text-fill-color:transparent;
  background-clip:text;
  -webkit-background-clip:text;
  background-image:linear-gradient(135deg,#FF8C6B,#FF5C35);
}
.hero p{font-size:14px;color:rgba(255,255,255,.68);line-height:1.7;max-width:360px;margin-bottom:24px}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap}
.hbtn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:50px;font-size:13.5px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;border:none}
.hbtn-white{background:#fff;color:var(--indigo)}
.hbtn-white:hover{background:#F0F0FF;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.hbtn-outline{background:rgba(255,255,255,.1);color:#fff;border:1.5px solid rgba(255,255,255,.3)}
.hbtn-outline:hover{background:rgba(255,255,255,.18)}

.hero-right{
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.hero-right::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,92,53,.35) 0%,rgba(99,102,241,.4) 100%);
}
.hero-art{
  position:relative;z-index:1;
  display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:24px;
}
.hero-app-pill{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:12px;padding:10px 12px;
  display:flex;align-items:center;gap:9px;
  color:#fff;
}
.hero-app-pill i{font-size:20px;flex-shrink:0}
.hero-app-pill-name{font-size:11px;font-weight:700;display:block}
.hero-app-pill-sub{font-size:10px;opacity:.65}

/* ═══ SECTION HEADERS ════════════════════════════════════════════════════════ */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;margin-top:36px}
.section-hd:first-child{margin-top:0}
.section-title{font-size:19px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px;letter-spacing:-.3px}
.section-sub{font-size:13px;color:var(--text3);margin-top:2px;font-weight:500}
.view-all{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:var(--indigo-mid);border:none;background:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:6px 14px;border-radius:50px;transition:all .15s}
.view-all:hover{background:var(--indigo-light)}

/* ═══ APP CARDS (Grid) ════════════════════════════════════════════════════════ */
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px}
.app-card{
  background:var(--surface);
  border-radius:18px;
  padding:18px 16px 14px;
  cursor:pointer;
  transition:all .22s;
  position:relative;
  box-shadow:var(--shadow-sm);
  border:1px solid var(--border);
  overflow:hidden;
}
.app-card:hover{
  transform:translateY(-5px);
  box-shadow:var(--shadow);
  border-color:var(--border2);
}
.card-icon-wrap{
  width:62px;height:62px;border-radius:16px;
  margin-bottom:12px;overflow:hidden;
  position:relative;
  box-shadow:0 4px 14px rgba(0,0,0,.12);
}
.card-icon-wrap img{width:100%;height:100%;object-fit:cover}
.card-icon-ph{
  width:62px;height:62px;border-radius:16px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:800;color:#fff;
  box-shadow:0 4px 14px rgba(0,0,0,.15);
}
.app-card-name{font-size:13.5px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.app-card-dev{font-size:11.5px;color:var(--text3);margin-bottom:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.app-card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rating{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--text2);font-weight:600}
.rating i{font-size:11px;color:var(--gold)}
.price-tag{font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:50px}
.price-tag.free{background:var(--green-light);color:var(--green)}
.price-tag.paid{background:var(--indigo-light);color:var(--indigo-mid)}
.btn-dl{
  width:100%;padding:8px;
  background:var(--indigo-light);color:var(--indigo-mid);
  border:none;border-radius:10px;
  font-size:12.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .15s;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.btn-dl:hover{background:var(--indigo);color:#fff;box-shadow:0 4px 14px rgba(49,46,129,.25)}
.btn-dl.success{background:var(--green-light);color:var(--green);pointer-events:none}

/* icon placeholder color variants */
.iph-0{background:linear-gradient(135deg,#6366F1,#8B5CF6)}
.iph-1{background:linear-gradient(135deg,#F59E0B,#EF4444)}
.iph-2{background:linear-gradient(135deg,#10B981,#0891B2)}
.iph-3{background:linear-gradient(135deg,#EC4899,#F43F5E)}
.iph-4{background:linear-gradient(135deg,#F97316,#FBBF24)}
.iph-5{background:linear-gradient(135deg,#14B8A6,#6366F1)}

/* ═══ FEATURED ROW (horizontal scroll) ════════════════════════════════════════ */
.featured-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.featured-row::-webkit-scrollbar{display:none}
.feat-card{
  flex-shrink:0;width:220px;
  background:var(--surface);
  border-radius:18px;padding:18px;
  cursor:pointer;
  transition:all .2s;
  box-shadow:var(--shadow-sm);
  border:1px solid var(--border);
  position:relative;overflow:hidden;
}
.feat-card::before{
  content:'';position:absolute;top:-30px;right:-20px;
  width:100px;height:100px;border-radius:50%;
  opacity:.08;
}
.feat-card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.feat-icon{width:56px;height:56px;border-radius:14px;object-fit:cover;margin-bottom:12px;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.feat-icon-ph{width:56px;height:56px;border-radius:14px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff}
.feat-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feat-dev{font-size:11.5px;color:var(--text3);font-weight:500;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feat-meta{display:flex;align-items:center;justify-content:space-between}
.feat-rating{display:flex;align-items:center;gap:3px;font-size:12px;font-weight:600;color:var(--text2)}
.feat-rating i{font-size:11px;color:var(--gold)}
.feat-btn{padding:5px 12px;background:var(--indigo);color:#fff;border:none;border-radius:50px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s}
.feat-btn:hover{background:var(--indigo-mid)}

/* ═══ TOP CHARTS ════════════════════════════════════════════════════════════ */
.top-list{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-sm)}
.top-item{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;transition:background .12s}
.top-item:hover{background:var(--bg)}
.top-item+.top-item{border-top:1px solid var(--border)}
.top-rank{font-size:15px;font-weight:800;width:26px;text-align:center;flex-shrink:0;color:var(--text3)}
.top-rank.r1{color:var(--gold)}
.top-rank.r2{color:#9CA3AF}
.top-rank.r3{color:#CD7F32}
.top-icon{width:48px;height:48px;border-radius:12px;object-fit:cover;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.top-icon-ph{width:48px;height:48px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.top-info{flex:1;min-width:0}
.top-name{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.top-sub{font-size:11.5px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:6px;font-weight:500}
.top-actions{display:flex;align-items:center;gap:10px;flex-shrink:0}
.top-price{font-size:12px;font-weight:700;color:var(--green)}
.top-price.paid{color:var(--indigo-mid)}
.btn-get{padding:7px 18px;background:var(--indigo-light);color:var(--indigo-mid);border:none;border-radius:50px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s}
.btn-get:hover{background:var(--indigo);color:#fff}

/* ═══ FILTER PILLS ══════════════════════════════════════════════════════════ */
.filter-pills{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-pill{padding:8px 18px;border-radius:50px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif}
.filter-pill:hover{border-color:var(--indigo-mid);color:var(--indigo-mid)}
.filter-pill.active{background:var(--indigo);border-color:var(--indigo);color:#fff;box-shadow:0 3px 12px rgba(49,46,129,.25)}

/* ═══ DETAIL MODAL ══════════════════════════════════════════════════════════ */
.overlay{display:none;position:fixed;inset:0;background:rgba(30,27,75,.4);backdrop-filter:blur(12px);z-index:400;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.overlay.open{display:flex}
.detail-modal{
  background:var(--surface);
  border-radius:24px;
  width:100%;max-width:680px;
  margin:auto;
  box-shadow:var(--shadow-lg);
  overflow:hidden;
  border:1px solid var(--border);
}
.detail-hero{
  padding:0;
  position:relative;
  background:var(--indigo);
  overflow:hidden;
  min-height:140px;
}
.detail-hero-bg{
  position:absolute;inset:0;
  background:linear-gradient(135deg,var(--indigo) 0%,#6366F1 60%,var(--coral) 100%);
  opacity:.9;
}
.detail-hero-inner{
  position:relative;z-index:1;
  display:flex;gap:18px;align-items:flex-end;
  padding:32px 28px 24px;
}
.detail-icon{width:84px;height:84px;border-radius:20px;object-fit:cover;flex-shrink:0;border:3px solid rgba(255,255,255,.3);box-shadow:0 8px 28px rgba(0,0,0,.25)}
.detail-icon-ph{width:84px;height:84px;border-radius:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;border:3px solid rgba(255,255,255,.3);color:#fff;background:rgba(255,255,255,.15)}
.detail-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:-.4px}
.detail-dev{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:10px;font-weight:500}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap}
.detail-tag{font-size:11px;padding:4px 12px;border-radius:50px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.9);font-weight:600}
.close-modal{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;z-index:2;transition:all .15s}
.close-modal:hover{background:rgba(255,255,255,.3)}

.detail-body{padding:24px 28px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.stat-card{text-align:center;background:var(--bg);border-radius:14px;padding:14px 6px;border:1px solid var(--border)}
.stat-val{font-size:17px;font-weight:800;display:block;color:var(--text)}
.stat-lbl{font-size:10.5px;color:var(--text3);margin-top:4px;display:block;text-transform:uppercase;letter-spacing:.05em;font-weight:600}

.dl-section{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-bottom:24px}
.btn-dl-big{padding:14px 22px;background:var(--indigo);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;width:100%;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 4px 16px rgba(49,46,129,.3)}
.btn-dl-big:hover{background:var(--indigo-mid);transform:translateY(-1px);box-shadow:0 8px 24px rgba(49,46,129,.35)}
.btn-dl-big.success{background:var(--green);pointer-events:none}
.btn-play{padding:14px 16px;background:var(--bg);color:var(--text);border:1.5px solid var(--border);border-radius:14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:all .15s;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.btn-play:hover{border-color:var(--indigo-mid);color:var(--indigo-mid)}

.dsec-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.detail-desc{font-size:13.5px;line-height:1.8;color:var(--text2);margin-bottom:20px;white-space:pre-line}
.detail-desc.clamped{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.read-more{font-size:13px;color:var(--indigo-mid);border:none;background:none;padding:0;margin-bottom:22px;display:block;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
.info-row{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.info-key{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:700}
.info-val{font-size:13px;font-weight:700;color:var(--text)}

.screenshots-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-bottom:22px;scrollbar-width:thin}
.screenshots-row img{height:175px;border-radius:14px;flex-shrink:0;border:1px solid var(--border);object-fit:cover}

.reviews-list{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
.review-card{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.review-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.review-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--indigo-mid),var(--coral));color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.review-name{font-size:13px;font-weight:700;color:var(--text)}
.review-stars{display:flex;gap:1px;margin-top:2px}
.review-stars i{font-size:11px;color:var(--gold)}
.review-text{font-size:13px;color:var(--text2);line-height:1.65}

.similar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
.similar-card{cursor:pointer;text-align:center;padding:10px 6px;border-radius:14px;transition:all .15s}
.similar-card:hover{background:var(--indigo-light)}
.similar-icon{width:52px;height:52px;border-radius:14px;object-fit:cover;margin:0 auto 7px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.similar-icon-ph{width:52px;height:52px;border-radius:14px;margin:0 auto 7px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff}
.similar-name{font-size:11.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.similar-rating{font-size:11px;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:2px;margin-top:2px}
.similar-rating i{font-size:10px;color:var(--gold)}

/* ═══ SKELETON ══════════════════════════════════════════════════════════════ */
.skeleton{background:linear-gradient(90deg,#ECEEF8 25%,#E2E4F0 50%,#ECEEF8 75%);background-size:200% 100%;animation:shimmer 1.7s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px 16px;box-shadow:var(--shadow-sm)}
.skel-icon{width:62px;height:62px;border-radius:16px;margin-bottom:12px}
.skel-line{height:11px;border-radius:6px;margin-bottom:7px}
.skel-line.w80{width:80%}.skel-line.w60{width:60%}.skel-line.w40{width:40%}

/* ═══ TOAST ═════════════════════════════════════════════════════════════════ */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--indigo);color:#fff;padding:12px 26px;border-radius:50px;font-size:13.5px;z-index:600;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(49,46,129,.4);font-weight:600}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast i{color:#A5F3FC}

/* ═══ EMPTY / ERROR ═════════════════════════════════════════════════════════ */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state i{font-size:52px;display:block;margin-bottom:14px;color:var(--border2)}
.empty-state h3{font-size:16px;color:var(--text2);margin-bottom:6px;font-weight:700}
.empty-state p{font-size:13.5px}
.error-banner{background:#FFF5F5;border:1.5px solid #FECACA;border-radius:14px;padding:14px 18px;font-size:13.5px;color:#EF4444;display:flex;align-items:center;gap:10px;margin-bottom:20px;font-weight:500}

/* ═══ RESPONSIVE ════════════════════════════════════════════════════════════ */
@media(max-width:900px){
  .hero{grid-template-columns:1fr}
  .hero-right{display:none}
  .hero h1{font-size:26px}
  .hero-left{padding:32px 28px}
}
@media(max-width:640px){
  .header{padding:0 16px;gap:10px}
  .logo-name{display:none}
  .main{padding:20px 16px 60px}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .dl-section{grid-template-columns:1fr}
  .nav-link{display:none}
  .hero-left{padding:24px 20px}
  .hero h1{font-size:22px}
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════════════════════════ -->
<header class="header">
  <a class="logo" href="#" onclick="goHome();return false">
    <div class="logo-badge"><i class="ti ti-device-mobile-down"></i></div>
    <span class="logo-name">SG APK<span>.store</span></span>
  </a>
  <div class="search-wrap">
    <i class="ti ti-search si"></i>
    <input type="text" id="searchInput" placeholder="Search apps, games, APKs…"
           oninput="handleSearchInput()" onkeydown="if(event.key==='Enter')doSearch()">
    <button class="clear-btn ti ti-x" onclick="clearSearch()"></button>
  </div>
  <nav class="header-nav">
    <a class="nav-link" href="/blog.html"><i class="ti ti-news"></i> Blog</a>
    <a class="nav-link" href="/about.html"><i class="ti ti-info-circle"></i> About</a>
    <button class="nav-cta"><i class="ti ti-download"></i> Get APK</button>
  </nav>
</header>

<!-- ═══ CATEGORY TAB BAR ══════════════════════════════════════════════════════ -->
<div class="cat-bar" id="catBar">
  <button class="cat-tab active" data-view="home" onclick="setView('home',null)"><i class="ti ti-home"></i> Home</button>
  <button class="cat-tab" data-view="top" onclick="setView('top',null)"><i class="ti ti-chart-bar"></i> Top Charts</button>
  <button class="cat-tab" data-view="new" onclick="setView('new',null)"><i class="ti ti-sparkles"></i> New</button>
  <div style="width:1px;height:24px;background:var(--border);flex-shrink:0;margin:0 4px"></div>
  <div id="catTabs"></div>
</div>

<!-- ═══ MAIN ══════════════════════════════════════════════════════════════════ -->
<div class="main" id="main"></div>

<!-- ═══ MODAL ════════════════════════════════════════════════════════════════ -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="detail-modal" id="detailModal"></div>
</div>

<!-- ═══ TOAST ════════════════════════════════════════════════════════════════ -->
<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toastMsg"></span></div>

<!-- ═══ FOOTER ════════════════════════════════════════════════════════════════ -->
<footer style="background:var(--indigo);padding:40px 28px;text-align:center;color:rgba(255,255,255,.6)">
  <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px">
    <div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#6366F1,#FF5C35);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff"><i class="ti ti-device-mobile-down"></i></div>
    <span style="font-weight:800;font-size:17px;color:#fff">SG APK<span style="color:#A5F3FC">.store</span></span>
  </div>
  <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:22px;margin-bottom:18px">
    <a href="/about.html" style="font-size:13px;color:rgba(255,255,255,.55);font-weight:600">About</a>
    <a href="/blog.html" style="font-size:13px;color:rgba(255,255,255,.55);font-weight:600">Blog</a>
    <a href="/contact.html" style="font-size:13px;color:rgba(255,255,255,.55);font-weight:600">Contact</a>
    <a href="/privacy.html" style="font-size:13px;color:rgba(255,255,255,.55);font-weight:600">Privacy Policy</a>
    <a href="/terms.html" style="font-size:13px;color:rgba(255,255,255,.55);font-weight:600">Terms of Service</a>
  </div>
  <div style="font-size:12px;color:rgba(255,255,255,.3)">© 2026 SG APK Apps — Not affiliated with Google LLC. App data from Google Play Store.</div>
</footer>

<script>
const API = '';
let currentView = 'home';
let currentCat  = null;
let searchTimer = null;
let categories  = [];

(async function init() {
  await loadCategories();
  renderHome();
})();

async function loadCategories() {
  try {
    const r = await fetch(`${API}/api/categories`);
    const d = await r.json();
    categories = d.categories;
    const catTabs = document.getElementById('catTabs');
    catTabs.innerHTML = categories.map(c => `
      <button class="cat-tab" data-view="cat" data-cat="${c.id}" onclick="setView('cat','${c.id}')">
        <i class="ti ${c.icon}"></i> ${c.label}
      </button>`).join('');
  } catch(e) { console.error(e); }
}

function setView(view, cat) {
  currentView = view;
  currentCat  = cat;
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.cat-tab').forEach(el => {
    el.classList.toggle('active',
      el.dataset.view === view && (view !== 'cat' || el.dataset.cat === cat));
  });
  if(view === 'home')        renderHome();
  else if(view === 'top')    renderTopCharts('APPLICATION','TOP_FREE');
  else if(view === 'new')    renderTopCharts('APPLICATION','NEW_FREE');
  else if(cat === 'SGAPPS') renderOwnApps();
  else if(view === 'cat')    renderCategory(cat);
  window.scrollTo({top:0,behavior:'smooth'});
}

function goHome() { setView('home', null); }

function handleSearchInput() {
  clearTimeout(searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  if(!q) { setView('home',null); return; }
  searchTimer = setTimeout(() => doSearch(), 420);
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  currentView = 'search';
  document.querySelectorAll('.cat-tab').forEach(el => el.classList.remove('active'));
  const main = document.getElementById('main');
  main.innerHTML = skeletonGrid(12);
  try {
    const r = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}&num=24`);
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    main.innerHTML = `
      <div class="section-hd">
        <div><div class="section-title">Results for "${q}"</div><div class="section-sub">${d.results.length} apps found</div></div>
      </div>
      ${d.results.length === 0 ? emptyState('No apps found','Try different keywords') : ''}
      <div class="app-grid">${d.results.map(appCard).join('')}</div>`;
  } catch(e) {
    main.innerHTML = errorBanner(e.message);
  }
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  setView('home', null);
}

async function renderHome() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="hero">
      <div class="hero-left">
        <div class="hero-pill"><i class="ti ti-shield-check" style="font-size:12px"></i> Trusted APK Source</div>
        <h1>Your Android app<br>library, <mark>unlimited.</mark></h1>
        <p>Live data pulled directly from Google Play. Millions of free and paid apps, games, and tools — no account required.</p>
        <div class="hero-actions">
          <button class="hbtn hbtn-white" onclick="setView('top',null)"><i class="ti ti-chart-bar"></i> Top Charts</button>
          <button class="hbtn hbtn-outline" onclick="setView('new',null)"><i class="ti ti-sparkles"></i> New Releases</button>
        </div>
      </div>
      <div class="hero-right">
        <div class="hero-art">
          <div class="hero-app-pill"><i class="ti ti-device-gamepad-2"></i><div><span class="hero-app-pill-name">Top Games</span><span class="hero-app-pill-sub">Updated daily</span></div></div>
          <div class="hero-app-pill"><i class="ti ti-chart-bar"></i><div><span class="hero-app-pill-name">3M+ Apps</span><span class="hero-app-pill-sub">All categories</span></div></div>
          <div class="hero-app-pill"><i class="ti ti-shield-check"></i><div><span class="hero-app-pill-name">Play Store</span><span class="hero-app-pill-sub">Verified source</span></div></div>
          <div class="hero-app-pill"><i class="ti ti-download"></i><div><span class="hero-app-pill-name">Free Access</span><span class="hero-app-pill-sub">No signup needed</span></div></div>
        </div>
      </div>
    </div>

    <div class="section-hd">
      <div><div class="section-title">🔥 Top Free Apps</div><div class="section-sub">Most downloaded right now</div></div>
      <button class="view-all" onclick="setView('top',null)">See all <i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="featuredRow" class="featured-row">${skeletonFeatured(6)}</div>

    <div class="section-hd">
      <div><div class="section-title">🎮 Top Games</div><div class="section-sub">Most popular games</div></div>
      <button class="view-all" onclick="setView('cat','GAME')">See all <i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="topGamesGrid">${skeletonGrid(6)}</div>

    <div class="section-hd">
      <div><div class="section-title">✨ New Releases</div><div class="section-sub">Fresh this week</div></div>
      <button class="view-all" onclick="setView('new',null)">See all <i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="newGrid">${skeletonGrid(6)}</div>
  `;

  Promise.all([
    fetchList('APPLICATION','TOP_FREE',8).then(apps => {
      const el = document.getElementById('featuredRow');
      if(el) el.innerHTML = apps.map(featCard).join('');
    }),
    fetchList('GAME','TOP_FREE',6).then(apps => {
      const el = document.getElementById('topGamesGrid');
      if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
    }),
    fetchList('APPLICATION','NEW_FREE',6).then(apps => {
      const el = document.getElementById('newGrid');
      if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
    }),
  ]).catch(console.error);
}

async function renderTopCharts(category, collection) {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="section-hd">
      <div><div class="section-title">Top Charts</div><div class="section-sub">Ranked by installs</div></div>
    </div>
    <div class="filter-pills">
      ${['TOP_FREE','TOP_PAID','NEW_FREE','NEW_PAID'].map(c=>`
        <button class="filter-pill ${c===collection?'active':''}" onclick="renderTopCharts('${category}','${c}')">
          ${c.replace('_',' ').toLowerCase().replace(/\b\w/g,x=>x.toUpperCase())}
        </button>`).join('')}
    </div>
    <div id="topListWrap">${skeletonList(20)}</div>`;
  try {
    const apps = await fetchList(category, collection, 30);
    const el = document.getElementById('topListWrap');
    if(el) el.innerHTML = `<div class="top-list">${apps.map((app,i)=>topItem(app,i)).join('')}</div>`;
  } catch(e) {
    const el = document.getElementById('topListWrap');
    if(el) el.innerHTML = errorBanner(e.message);
  }
}

async function renderCategory(catId) {
  const main = document.getElementById('main');
  const cat = categories.find(c=>c.id===catId) || { label: catId, icon:'ti-apps' };
  main.innerHTML = `
    <div class="section-hd">
      <div><div class="section-title"><i class="ti ${cat.icon}" style="color:var(--indigo-mid)"></i> ${cat.label}</div><div class="section-sub">Top free apps</div></div>
    </div>
    <div id="catGridWrap">${skeletonGrid(18)}</div>`;
  try {
    const apps = await fetchList(catId, 'TOP_FREE', 30);
    const el = document.getElementById('catGridWrap');
    if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
  } catch(e) {
    const el = document.getElementById('catGridWrap');
    if(el) el.innerHTML = errorBanner(e.message);
  }
}

async function renderOwnApps() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="section-hd">
      <div><div class="section-title"><i class="ti ti-brand-android" style="color:var(--green)"></i> SG APK Apps</div></div>
    </div>
    <div id="ownAppsGrid">${skeletonGrid(12)}</div>`;
  try {
    const r = await fetch('/api/sgappstech');
    const d = await r.json();
    document.getElementById('ownAppsGrid').innerHTML = `<div class="app-grid">${d.results.map(appCard).join('')}</div>`;
  } catch(e) {
    document.getElementById('ownAppsGrid').innerHTML = errorBanner(e.message);
  }
}

async function fetchList(category, collection, num) {
  const r = await fetch(`${API}/api/top?category=${category}&collection=${collection}&num=${num}`);
  const d = await r.json();
  if(d.error) throw new Error(d.error);
  return d.results;
}

const IPH = ['iph-0','iph-1','iph-2','iph-3','iph-4','iph-5'];
function iphClass(str) { let h=0;for(let i=0;i<(str||'').length;i++)h=(h*31+str.charCodeAt(i))|0;return IPH[Math.abs(h)%IPH.length]; }

function appCard(app) {
  const initial = (app.title||'?')[0].toUpperCase();
  const cls = iphClass(app.appId);
  const isFree = app.price === 'Free';
  const iconHtml = app.icon
    ? `<div class="card-icon-wrap"><img src="${app.icon}" alt="${esc(app.title)}" loading="lazy" onerror="this.parentElement.outerHTML='<div class=\\"card-icon-ph ${cls}\\">${initial}</div>'"></div>`
    : `<div class="card-icon-ph ${cls}">${initial}</div>`;
  return `
    <div class="app-card" onclick="openDetail('${esc(app.appId)}')">
      ${iconHtml}
      <div class="app-card-name">${esc(app.title)}</div>
      <div class="app-card-dev">${esc(app.developer)}</div>
      <div class="app-card-meta">
        <div class="rating"><i class="ti ti-star-filled"></i>${app.score}</div>
        <span class="price-tag ${isFree?'free':'paid'}">${app.price}</span>
      </div>
      <button class="btn-dl" onclick="event.stopPropagation();quickDownload(this,'${esc(app.title)}','${esc(app.url)}')">
        <i class="ti ti-download"></i> Get APK
      </button>
    </div>`;
}

function featCard(app) {
  const initial = (app.title||'?')[0].toUpperCase();
  const cls = iphClass(app.appId);
  const iconHtml = app.icon
    ? `<img class="feat-icon" src="${app.icon}" alt="${esc(app.title)}" loading="lazy" onerror="this.outerHTML='<div class=\\"feat-icon-ph ${cls}\\">${initial}</div>'">`
    : `<div class="feat-icon-ph ${cls}">${initial}</div>`;
  return `
    <div class="feat-card" onclick="openDetail('${esc(app.appId)}')">
      ${iconHtml}
      <div class="feat-name">${esc(app.title)}</div>
      <div class="feat-dev">${esc(app.developer)}</div>
      <div class="feat-meta">
        <div class="feat-rating"><i class="ti ti-star-filled"></i>${app.score}</div>
        <button class="feat-btn" onclick="event.stopPropagation();quickDownload(this,'${esc(app.title)}','${esc(app.url)}')">Get</button>
      </div>
    </div>`;
}

function topItem(app, i) {
  const initial = (app.title||'?')[0].toUpperCase();
  const cls = iphClass(app.appId);
  const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'';
  const iconHtml = app.icon
    ? `<img class="top-icon" src="${app.icon}" alt="${esc(app.title)}" loading="lazy" onerror="this.outerHTML='<div class=\\"top-icon-ph ${cls}\\">${initial}</div>'">`
    : `<div class="top-icon-ph ${cls}">${initial}</div>`;
  const isFree = app.price === 'Free';
  return `
    <div class="top-item" onclick="openDetail('${esc(app.appId)}')">
      <span class="top-rank ${rankClass}">${i+1}</span>
      ${iconHtml}
      <div class="top-info">
        <div class="top-name">${esc(app.title)}</div>
        <div class="top-sub">
          <span><i class="ti ti-star-filled" style="color:var(--gold);font-size:11px"></i> ${app.score}</span>
          <span>·</span><span>${esc(app.genre)}</span>
          <span>·</span><span>${app.installs}</span>
        </div>
      </div>
      <div class="top-actions">
        <span class="top-price ${isFree?'':'paid'}">${app.price}</span>
        <button class="btn-get" onclick="event.stopPropagation();quickDownload(this,'${esc(app.title)}','${esc(app.url)}')">
          <i class="ti ti-download"></i> Get
        </button>
      </div>
    </div>`;
}

async function openDetail(appId) {
  const overlay = document.getElementById('overlay');
  const modal   = document.getElementById('detailModal');
  overlay.classList.add('open');
  modal.innerHTML = `<div style="padding:48px;text-align:center;color:var(--text3)">
    <i class="ti ti-loader-2" style="font-size:30px;display:block;margin-bottom:10px;animation:spin 1s linear infinite;color:var(--indigo-mid)"></i>
    Loading app details…
  </div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

  try {
    const [appRes, reviewRes] = await Promise.all([
      fetch(`${API}/api/app/${encodeURIComponent(appId)}`),
      fetch(`${API}/api/reviews/${encodeURIComponent(appId)}`),
    ]);
    const app     = await appRes.json();
    const revData = await reviewRes.json().catch(()=>({reviews:[]}));
    if(app.error) throw new Error(app.error);

    const initial  = (app.title||'?')[0].toUpperCase();
    const cls = iphClass(app.appId);
    const isFree   = app.price === 'Free';
    const iconHtml = app.icon
      ? `<img class="detail-icon" src="${app.icon}" alt="${esc(app.title)}" onerror="this.outerHTML='<div class=\\"detail-icon-ph ${cls}\\">${initial}</div>'">`
      : `<div class="detail-icon-ph ${cls}">${initial}</div>`;

    const screenshots = (app.screenshots||[]).slice(0,8).map(s=>
      `<img src="${s}" alt="screenshot" loading="lazy">`).join('');

    const reviews = (revData.reviews||[]).slice(0,3).map(r=>`
      <div class="review-card">
        <div class="review-head">
          <div class="review-avatar">${(r.userName||'U')[0].toUpperCase()}</div>
          <div>
            <div class="review-name">${esc(r.userName||'User')}</div>
            <div class="review-stars">${'<i class="ti ti-star-filled"></i>'.repeat(r.score||5)}</div>
          </div>
        </div>
        <div class="review-text">${esc((r.text||'').substring(0,200))}${(r.text||'').length>200?'…':''}</div>
      </div>`).join('');

    modal.innerHTML = `
      <div class="detail-hero">
        <div class="detail-hero-bg"></div>
        <button class="close-modal" onclick="closeDetail()"><i class="ti ti-x"></i></button>
        <div class="detail-hero-inner">
          ${iconHtml}
          <div>
            <div class="detail-title">${esc(app.title)}</div>
            <div class="detail-dev">by ${esc(app.developer)}</div>
            <div class="detail-tags">
              <span class="detail-tag">${isFree?'Free':app.price}</span>
              <span class="detail-tag">${esc(app.genre)}</span>
              <span class="detail-tag">${esc(app.contentRating)}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="detail-body">
        <div class="stat-row">
          <div class="stat-card"><span class="stat-val">⭐ ${app.score}</span><span class="stat-lbl">Rating</span></div>
          <div class="stat-card"><span class="stat-val">${app.installs}</span><span class="stat-lbl">Installs</span></div>
          <div class="stat-card"><span class="stat-val">${app.size||'—'}</span><span class="stat-lbl">Size</span></div>
          <div class="stat-card"><span class="stat-val">${app.version||'—'}</span><span class="stat-lbl">Version</span></div>
        </div>
        <div class="dl-section">
          <button class="btn-dl-big" onclick="quickDownload(this,'${esc(app.title)}','${esc(app.url)}')">
            <i class="ti ti-download"></i> Download APK
          </button>
          <a href="${app.url}" target="_blank" rel="noopener">
            <button class="btn-play"><i class="ti ti-brand-google-play"></i> Play Store</button>
          </a>
        </div>
        <div class="dsec-title">About this app</div>
        <div class="detail-desc clamped" id="descText">${esc(app.description||app.summary||'No description available.')}</div>
        <button class="read-more" id="readMoreBtn" onclick="toggleDesc()">Read more ▼</button>
        ${screenshots ? `<div class="dsec-title">Screenshots</div><div class="screenshots-row">${screenshots}</div>` : ''}
        <div class="dsec-title">App Info</div>
        <div class="info-grid">
          <div class="info-row"><div class="info-key">Developer</div><div class="info-val">${esc(app.developer)}</div></div>
          <div class="info-row"><div class="info-key">Updated</div><div class="info-val">${esc(app.updated||'—')}</div></div>
          <div class="info-row"><div class="info-key">Android</div><div class="info-val">${esc(app.androidVersion||'—')}</div></div>
          <div class="info-row"><div class="info-key">Price</div><div class="info-val">${esc(app.price)}</div></div>
        </div>
        ${reviews ? `<div class="dsec-title">User Reviews</div><div class="reviews-list">${reviews}</div>` : ''}
        <div id="similarWrap"></div>
      </div>`;

    fetch(`${API}/api/similar/${encodeURIComponent(appId)}`)
      .then(r=>r.json())
      .then(d=>{
        const el = document.getElementById('similarWrap');
        if(!el||!d.results||!d.results.length) return;
        el.innerHTML = `
          <div class="dsec-title" style="margin-top:8px">Similar Apps</div>
          <div class="similar-grid">${d.results.map(a=>{
            const ini = (a.title||'?')[0].toUpperCase();
            const sc = iphClass(a.appId);
            const ico = a.icon
              ? `<img class="similar-icon" src="${a.icon}" loading="lazy" onerror="this.outerHTML='<div class=\\"similar-icon-ph ${sc}\\">${ini}</div>'">`
              : `<div class="similar-icon-ph ${sc}">${ini}</div>`;
            return `<div class="similar-card" onclick="closeDetail();setTimeout(()=>openDetail('${esc(a.appId)}'),200)">
              ${ico}
              <div class="similar-name">${esc(a.title)}</div>
              <div class="similar-rating"><i class="ti ti-star-filled"></i>${a.score}</div>
            </div>`;
          }).join('')}</div>`;
      }).catch(()=>{});

  } catch(e) {
    modal.innerHTML = `<div style="padding:28px">${errorBanner(e.message)}<button class="btn-dl" style="width:100%" onclick="closeDetail()">Close</button></div>`;
  }
}

function closeDetail() { document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e) { if(e.target===document.getElementById('overlay')) closeDetail(); }
function toggleDesc() {
  const el  = document.getElementById('descText');
  const btn = document.getElementById('readMoreBtn');
  if(!el) return;
  el.classList.toggle('clamped');
  btn.textContent = el.classList.contains('clamped') ? 'Read more ▼' : 'Show less ▲';
}

function quickDownload(btn, name, url) {
  const orig = btn.innerHTML;
  btn.innerHTML = '<i class="ti ti-check"></i> Done!';
  btn.classList.add('success');
  setTimeout(()=>{ btn.innerHTML=orig; btn.classList.remove('success'); }, 2200);
  showToast(`Opening ${name}…`);
  if(url) window.open(url, '_blank', 'noopener');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function skeletonGrid(n) {
  return `<div class="app-grid">${Array(n).fill(`
    <div class="skel-card">
      <div class="skeleton skel-icon"></div>
      <div class="skeleton skel-line w80"></div>
      <div class="skeleton skel-line w60"></div>
      <div class="skeleton skel-line w40"></div>
    </div>`).join('')}</div>`;
}

function skeletonFeatured(n) {
  return Array(n).fill(`
    <div class="feat-card" style="flex-shrink:0;width:220px">
      <div class="skeleton" style="width:56px;height:56px;border-radius:14px;margin-bottom:12px"></div>
      <div class="skeleton skel-line w80" style="margin-bottom:7px"></div>
      <div class="skeleton skel-line w60"></div>
    </div>`).join('');
}

function skeletonList(n) {
  return `<div class="top-list">${Array(n).fill(`
    <div class="top-item">
      <div class="skeleton" style="width:26px;height:20px;border-radius:5px"></div>
      <div class="skeleton" style="width:48px;height:48px;border-radius:12px;flex-shrink:0"></div>
      <div style="flex:1"><div class="skeleton skel-line w80" style="margin-bottom:7px"></div><div class="skeleton skel-line w50"></div></div>
    </div>`).join('')}</div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function errorBanner(msg) {
  return `<div class="error-banner"><i class="ti ti-alert-triangle" style="font-size:18px;flex-shrink:0"></i>
    <div><strong>Could not load apps.</strong> Make sure the server is running.<br>
    <span style="font-size:12px;opacity:.75">${esc(msg)}</span></div></div>`;
}

function emptyState(title, sub) {
  return `<div class="empty-state"><i class="ti ti-search-off"></i><h3>${title}</h3><p>${sub}</p></div>`;
}
</script>
</body>
</html>
