<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG APK Apps — Android APK Store</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#F5F6FA;
  --bg2:#ECEEF5;
  --surface:#FFFFFF;
  --surface2:#F0F2F9;
  --surface3:#E8EBF4;
  --border:#DDE1EE;
  --border2:#C8CEDF;
  --accent:#4F6EF7;
  --accent-dim:rgba(79,110,247,.1);
  --accent-glow:rgba(79,110,247,.22);
  --accent2:#7C3AED;
  --accent3:#059669;
  --accent4:#DC2626;
  --accent5:#D97706;
  --text:#1A1D2E;
  --text2:#4B5068;
  --text3:#8890AD;
  --gold:#F59E0B;
  --green:#059669;
  --red:#DC2626;
  --white:#FFFFFF;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer}

/* ─── Scrollbar ─────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ─── Header ────────────────────────────────────────────────────────────── */
.header{
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  display:flex;align-items:center;gap:16px;
  height:62px;position:sticky;top:0;z-index:200;
  box-shadow:0 1px 4px rgba(26,29,46,.06);
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-mark{
  width:36px;height:36px;
  background:var(--accent);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:14px;font-weight:800;
  font-family:'DM Mono',monospace;
  box-shadow:0 3px 10px var(--accent-glow);
}
.logo-text{font-size:16px;font-weight:800;letter-spacing:-.3px;color:var(--text);font-family:'DM Mono',monospace}
.logo-text span{color:var(--accent)}

.search-wrap{flex:1;max-width:480px;position:relative}
.search-wrap .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.search-wrap input{
  width:100%;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:9px 38px 9px 40px;
  font-size:13.5px;outline:none;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-weight:500;
  transition:border-color .15s,box-shadow .15s;
}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);background:var(--white)}
.search-wrap .clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:14px;display:none;padding:4px;line-height:1}
.search-wrap input:not(:placeholder-shown)~.clear-btn{display:block}

.header-nav{display:flex;align-items:center;gap:4px;margin-left:auto}
.nav-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 13px;border-radius:8px;
  font-size:13px;font-weight:600;
  border:none;background:transparent;
  color:var(--text2);
  transition:all .12s;
  font-family:'Inter',sans-serif;
}
.nav-btn:hover{background:var(--bg2);color:var(--text)}
.nav-btn.primary{
  background:var(--accent);color:#fff;
  padding:8px 18px;font-weight:700;
  box-shadow:0 2px 8px var(--accent-glow);
}
.nav-btn.primary:hover{background:#3D5AE8;box-shadow:0 4px 16px var(--accent-glow)}

/* ─── Layout ────────────────────────────────────────────────────────────── */
.layout{display:flex;min-height:calc(100vh - 62px)}

/* ─── Sidebar ───────────────────────────────────────────────────────────── */
.sidebar{
  width:208px;flex-shrink:0;
  background:var(--white);
  border-right:1px solid var(--border);
  padding:16px 10px 24px;
  position:sticky;top:62px;
  height:calc(100vh - 62px);
  overflow-y:auto;
}
.sidebar-label{
  font-size:10px;font-weight:700;
  color:var(--text3);
  text-transform:uppercase;letter-spacing:.14em;
  padding:14px 10px 6px;
  font-family:'DM Mono',monospace;
}
.sidebar-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;
  font-size:13px;cursor:pointer;
  color:var(--text2);
  border-radius:8px;
  margin-bottom:2px;
  transition:all .1s;
  font-weight:500;
  user-select:none;
}
.sidebar-item:hover{background:var(--bg2);color:var(--text)}
.sidebar-item.active{
  background:var(--accent-dim);
  color:var(--accent);
  font-weight:700;
}
.sidebar-item i{font-size:16px;flex-shrink:0}
.sidebar-divider{border:none;border-top:1px solid var(--border);margin:10px 4px}

/* ─── Main ──────────────────────────────────────────────────────────────── */
.main{flex:1;min-width:0;padding:28px 32px 60px}

/* ─── Hero ──────────────────────────────────────────────────────────────── */
.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  border-radius:16px;
  padding:44px 48px;
  margin-bottom:24px;
  color:#fff;
}
.hero::before{
  content:'';position:absolute;right:-60px;top:-60px;
  width:320px;height:320px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  pointer-events:none;
}
.hero::after{
  content:'';position:absolute;right:80px;bottom:-80px;
  width:200px;height:200px;
  border-radius:50%;
  background:rgba(255,255,255,.05);
  pointer-events:none;
}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center}
.hero-eyebrow{
  font-size:11px;font-weight:700;
  color:rgba(255,255,255,.75);
  text-transform:uppercase;letter-spacing:.18em;
  margin-bottom:12px;
  font-family:'DM Mono',monospace;
  display:flex;align-items:center;gap:6px;
}
.hero-eyebrow::before{content:'';width:18px;height:2px;background:rgba(255,255,255,.6);display:inline-block;border-radius:2px}
.hero h1{
  font-size:34px;font-weight:800;
  line-height:1.1;letter-spacing:-.8px;
  margin-bottom:12px;
  color:#fff;
}
.hero h1 em{
  font-style:normal;
  opacity:.85;
  display:block;
}
.hero p{font-size:14px;color:rgba(255,255,255,.8);line-height:1.75;max-width:380px;margin-bottom:24px}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.hbtn{
  display:inline-flex;align-items:center;gap:7px;
  padding:11px 20px;border-radius:10px;
  font-size:13px;font-weight:700;
  cursor:pointer;transition:all .15s;
  font-family:'Inter',sans-serif;
  letter-spacing:.01em;
}
.hbtn-solid{background:#fff;color:var(--accent);border:none;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.hbtn-solid:hover{background:#F0F2FF;transform:translateY(-1px)}
.hbtn-ghost{background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.3)}
.hbtn-ghost:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.5)}

.hero-stats{display:flex;flex-direction:column;gap:12px;position:relative;z-index:1}
.hstat{
  border:1px solid rgba(255,255,255,.2);
  border-radius:12px;
  padding:16px 20px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(10px);
}
.hstat-num{
  font-size:24px;font-weight:800;
  font-family:'DM Mono',monospace;
  letter-spacing:-.5px;
  line-height:1;
  margin-bottom:3px;
  color:#fff;
}
.hstat-lbl{font-size:12px;color:rgba(255,255,255,.7);font-weight:500}

/* ─── Section Headers ───────────────────────────────────────────────────── */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin:28px 0 14px}
.section-hd:first-child{margin-top:0}
.section-title{
  font-size:13px;font-weight:800;
  display:flex;align-items:center;gap:8px;
  color:var(--text);
  text-transform:uppercase;letter-spacing:.08em;
}
.section-title i{font-size:17px;color:var(--accent)}
.count-badge{
  font-size:10px;font-weight:700;
  color:var(--text3);
  background:var(--bg2);
  padding:2px 8px;border-radius:20px;
  border:1px solid var(--border);
  font-family:'DM Mono',monospace;
  text-transform:none;letter-spacing:0;
}
.view-all{
  font-size:12px;color:var(--accent);
  cursor:pointer;border:none;background:none;
  font-family:'Inter',sans-serif;font-weight:700;
  display:flex;align-items:center;gap:3px;
  letter-spacing:.03em;text-transform:uppercase;
  transition:opacity .12s;
}
.view-all:hover{opacity:.7}

/* ─── Category Chips ────────────────────────────────────────────────────── */
.cat-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.cat-chip{
  display:flex;align-items:center;gap:6px;
  padding:8px 15px;border-radius:10px;
  border:1.5px solid var(--border);
  font-size:12.5px;font-weight:600;
  cursor:pointer;
  background:var(--white);color:var(--text2);
  transition:all .12s;white-space:nowrap;
  box-shadow:0 1px 3px rgba(26,29,46,.04);
}
.cat-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);transform:translateY(-1px)}
.cat-chip i{font-size:14px}

/* ─── App Grid ──────────────────────────────────────────────────────────── */
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.app-card{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:12px;padding:14px 12px 10px;
  cursor:pointer;transition:all .18s;
  position:relative;overflow:hidden;
  box-shadow:0 1px 4px rgba(26,29,46,.05);
}
.app-card:hover{border-color:var(--accent);background:var(--white);transform:translateY(-3px);box-shadow:0 8px 24px rgba(79,110,247,.15)}
.app-card-icon{width:52px;height:52px;border-radius:12px;object-fit:cover;margin-bottom:10px}
.app-card-icon-ph{
  width:52px;height:52px;border-radius:12px;margin-bottom:10px;
  background:var(--accent-dim);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);font-size:20px;font-weight:800;
  border:1px solid rgba(79,110,247,.15);
  font-family:'DM Mono',monospace;
}
.app-card-name{font-size:12.5px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.app-card-dev{font-size:11px;color:var(--text3);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.rating{display:flex;align-items:center;gap:3px;font-size:11.5px;color:var(--text2);font-weight:600;font-family:'DM Mono',monospace}
.rating i{font-size:10px;color:var(--gold)}
.app-price{font-size:11px;font-weight:700;color:var(--green);font-family:'DM Mono',monospace}
.app-price.paid{color:var(--accent2)}
.btn-dl{
  width:100%;padding:7px;
  background:var(--accent-dim);color:var(--accent);
  border:1.5px solid rgba(79,110,247,.2);
  border-radius:8px;
  font-size:11.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .12s;
  font-family:'Inter',sans-serif;
}
.btn-dl:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-dl.success{background:var(--green);border-color:var(--green);color:#fff;pointer-events:none}
.badge{position:absolute;top:8px;right:8px;font-size:9.5px;padding:3px 7px;border-radius:6px;font-weight:700;letter-spacing:.04em;font-family:'DM Mono',monospace}
.badge-free{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0}
.badge-top{background:#FFF7ED;color:#D97706;border:1px solid #FDE68A}

/* ─── Top Charts ────────────────────────────────────────────────────────── */
.top-list{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:12px;overflow:hidden;
  box-shadow:0 1px 4px rgba(26,29,46,.05);
}
.top-item{display:flex;align-items:center;gap:12px;padding:13px 18px;cursor:pointer;transition:background .1s}
.top-item:hover{background:var(--bg2)}
.top-item+.top-item{border-top:1px solid var(--border)}
.top-rank{
  font-size:14px;font-weight:700;width:24px;text-align:center;
  flex-shrink:0;color:var(--text3);
  font-family:'DM Mono',monospace;
}
.top-rank.r1{color:var(--gold)}
.top-rank.r2{color:#9CA3AF}
.top-rank.r3{color:#CD8B5A}
.top-icon{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0}
.top-icon-ph{
  width:44px;height:44px;border-radius:10px;flex-shrink:0;
  background:var(--accent-dim);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);font-size:16px;font-weight:800;
  font-family:'DM Mono',monospace;
  border:1px solid rgba(79,110,247,.15);
}
.top-info{flex:1;min-width:0}
.top-name{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.top-sub{font-size:11.5px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace}
.top-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-small-dl{
  padding:6px 14px;
  background:var(--accent-dim);color:var(--accent);
  border:1.5px solid rgba(79,110,247,.2);
  border-radius:8px;
  font-size:11.5px;font-weight:700;
  display:flex;align-items:center;gap:4px;
  transition:all .12s;
  font-family:'Inter',sans-serif;
}
.btn-small-dl:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ─── Detail Modal ──────────────────────────────────────────────────────── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(26,29,46,.5);
  backdrop-filter:blur(10px);
  z-index:400;
  align-items:flex-start;justify-content:center;
  padding:24px;overflow-y:auto;
}
.overlay.open{display:flex}
.detail-modal{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:16px;
  width:100%;max-width:680px;
  margin:auto;
  box-shadow:0 24px 80px rgba(26,29,46,.2);
  overflow:hidden;
}
.detail-hero{
  background:linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  padding:28px;position:relative;
}
.detail-hero-inner{display:flex;gap:18px;align-items:flex-start}
.detail-icon{width:80px;height:80px;border-radius:16px;object-fit:cover;flex-shrink:0;border:3px solid rgba(255,255,255,.3)}
.detail-icon-ph{
  width:80px;height:80px;border-radius:16px;flex-shrink:0;
  background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:34px;font-weight:800;
  border:3px solid rgba(255,255,255,.3);
  color:#fff;
  font-family:'DM Mono',monospace;
}
.detail-title{font-size:20px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px;color:#fff}
.detail-dev{font-size:12.5px;color:rgba(255,255,255,.75);margin-bottom:10px}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap}
.detail-tag{
  font-size:10.5px;padding:3px 10px;border-radius:6px;
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.9);font-weight:600;
  font-family:'DM Mono',monospace;
}
.close-modal{
  position:absolute;top:14px;right:14px;
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);
  color:#fff;
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;cursor:pointer;
  transition:all .12s;
}
.close-modal:hover{background:rgba(255,255,255,.3)}

.detail-body{padding:24px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.stat-card{
  text-align:center;
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;padding:14px 4px;
}
.stat-val{font-size:16px;font-weight:800;display:block;color:var(--text);font-family:'DM Mono',monospace}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:4px;display:block;text-transform:uppercase;letter-spacing:.08em;font-weight:600}

.dl-section{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-bottom:22px}
.btn-dl-big{
  padding:13px 20px;
  background:var(--accent);color:#fff;
  border:none;border-radius:10px;
  font-size:14px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;width:100%;
  font-family:'Inter',sans-serif;
  letter-spacing:.01em;
  box-shadow:0 4px 14px var(--accent-glow);
}
.btn-dl-big:hover{background:#3D5AE8;box-shadow:0 6px 20px var(--accent-glow);transform:translateY(-1px)}
.btn-dl-big.success{background:var(--green);pointer-events:none;box-shadow:none}
.btn-play{
  padding:13px 14px;
  background:var(--white);color:var(--text);
  border:1.5px solid var(--border);border-radius:10px;
  font-size:12.5px;font-weight:700;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:all .15s;font-family:'Inter',sans-serif;
}
.btn-play:hover{border-color:var(--accent);color:var(--accent)}

.detail-section-title{
  font-size:10px;font-weight:800;
  margin-bottom:10px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.14em;
  font-family:'DM Mono',monospace;
}
.detail-desc{font-size:13.5px;line-height:1.8;color:var(--text2);margin-bottom:20px;white-space:pre-line}
.detail-desc.clamped{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.read-more{font-size:12.5px;color:var(--accent);border:none;background:none;padding:0;margin-bottom:22px;display:block;cursor:pointer;font-family:'Inter',sans-serif;font-weight:700}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.info-row{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px}
.info-key{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;font-weight:700;font-family:'DM Mono',monospace}
.info-val{font-size:13px;font-weight:600;color:var(--text)}

.screenshots-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px;scrollbar-width:thin}
.screenshots-row img{height:170px;border-radius:10px;flex-shrink:0;border:1.5px solid var(--border);object-fit:cover}

.reviews-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.review-card{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px}
.review-head{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.review-avatar{
  width:32px;height:32px;border-radius:8px;
  background:var(--accent-dim);
  color:var(--accent);
  border:1px solid rgba(79,110,247,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;flex-shrink:0;
  font-family:'DM Mono',monospace;
}
.review-name{font-size:13px;font-weight:600;color:var(--text)}
.review-stars{display:flex;gap:1px;margin-top:2px}
.review-stars i{font-size:10px;color:var(--gold)}
.review-text{font-size:12.5px;color:var(--text2);line-height:1.65}

.similar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.similar-card{cursor:pointer;text-align:center;padding:10px 6px;border-radius:10px;transition:all .12s;border:1.5px solid transparent}
.similar-card:hover{background:var(--bg2);border-color:var(--border)}
.similar-icon{width:48px;height:48px;border-radius:12px;object-fit:cover;margin:0 auto 6px}
.similar-icon-ph{
  width:48px;height:48px;border-radius:12px;margin:0 auto 6px;
  background:var(--accent-dim);border:1px solid rgba(79,110,247,.15);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);font-size:18px;font-weight:800;
  font-family:'DM Mono',monospace;
}
.similar-name{font-size:11.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.similar-rating{font-size:10.5px;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:2px;margin-top:2px;font-family:'DM Mono',monospace}
.similar-rating i{font-size:9px;color:var(--gold)}

/* ─── Skeleton ──────────────────────────────────────────────────────────── */
.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--surface3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.8s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:14px 12px;box-shadow:0 1px 4px rgba(26,29,46,.05)}
.skel-icon{width:52px;height:52px;border-radius:12px;margin-bottom:10px}
.skel-line{height:11px;border-radius:4px;margin-bottom:6px}
.skel-line.w80{width:80%}.skel-line.w60{width:60%}.skel-line.w40{width:40%}

/* ─── Toast ─────────────────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--text);border:1px solid rgba(255,255,255,.1);
  color:#fff;
  padding:10px 22px;border-radius:10px;
  font-size:13px;z-index:600;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.2);
  font-weight:600;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast i{color:#4ADE80}

/* ─── Empty/Error ───────────────────────────────────────────────────────── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state i{font-size:44px;display:block;margin-bottom:12px;color:var(--border2)}
.empty-state h3{font-size:15px;color:var(--text2);margin-bottom:6px;font-weight:700}
.empty-state p{font-size:13px}
.error-banner{
  background:#FEF2F2;border:1.5px solid #FECACA;
  border-radius:10px;padding:12px 16px;
  font-size:13px;color:var(--red);
  display:flex;align-items:center;gap:10px;margin-bottom:18px;font-weight:500;
}

/* ─── Filter Pills ──────────────────────────────────────────────────────── */
.filter-pills{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
.filter-pill{
  padding:7px 16px;border-radius:8px;
  font-size:12px;font-weight:700;
  border:1.5px solid var(--border);
  background:var(--white);color:var(--text2);
  cursor:pointer;transition:all .12s;
  font-family:'Inter',sans-serif;
  text-transform:uppercase;letter-spacing:.05em;
}
.filter-pill:hover{border-color:var(--accent);color:var(--accent)}
.filter-pill.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* ─── Responsive ────────────────────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:16px 16px 40px}
  .header{padding:0 14px;gap:10px}
  .logo-text{display:none}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .dl-section{grid-template-columns:1fr}
  .hero-grid{grid-template-columns:1fr}
  .hero-stats{display:none}
  .hero{padding:28px 24px}
  .hero h1{font-size:26px}
  .nav-btn:not(.primary){display:none}
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <a class="logo" href="#" onclick="goHome()">
    <div class="logo-mark">SG</div>
    <span class="logo-text">APK<span>.store</span></span>
  </a>
  <div class="search-wrap">
    <i class="ti ti-search si"></i>
    <input type="text" id="searchInput" placeholder="Search apps, games, APKs…"
           oninput="handleSearchInput()" onkeydown="if(event.key==='Enter')doSearch()">
    <button class="clear-btn ti ti-x" onclick="clearSearch()"></button>
  </div>
  <div class="header-nav">
    <button class="nav-btn" onclick="setView('top',null)"><i class="ti ti-chart-bar"></i> Charts</button>
    <a class="nav-btn" href="/blog.html" style="text-decoration:none"><i class="ti ti-news"></i> Blog</a>
    <a class="nav-btn" href="/about.html" style="text-decoration:none"><i class="ti ti-info-circle"></i> About</a>
    <button class="nav-btn primary"><i class="ti ti-download"></i> Get APK</button>
  </div>
</header>

<!-- Layout -->
<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">Discover</div>
    <div class="sidebar-item active" data-view="home" onclick="setView('home',null)"><i class="ti ti-home"></i>Home</div>
    <div class="sidebar-item" data-view="top" onclick="setView('top',null)"><i class="ti ti-chart-bar"></i>Top Charts</div>
    <div class="sidebar-item" data-view="new" onclick="setView('new',null)"><i class="ti ti-sparkles"></i>New Releases</div>
    <hr class="sidebar-divider">
    <div class="sidebar-label">Categories</div>
    <div id="catNav"></div>
  </nav>

  <main class="main" id="main"></main>
</div>

<!-- Detail Modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="detail-modal" id="detailModal"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toastMsg"></span></div>

<!-- Footer -->
<footer style="background:var(--white);border-top:1.5px solid var(--border);padding:32px 24px;text-align:center">
  <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px">
    <div style="width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-family:'DM Mono',monospace;font-weight:800;box-shadow:0 2px 8px var(--accent-glow)">SG</div>
    <span style="font-weight:800;font-size:15px;color:var(--text);font-family:'DM Mono',monospace">APK<span style="color:var(--accent)">.store</span></span>
  </div>
  <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:24px;margin-bottom:16px">
    <a href="/about.html" style="font-size:12px;color:var(--text3);text-decoration:none;font-weight:600;text-transform:uppercase;letter-spacing:.08em;transition:color .12s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">About</a>
    <a href="/blog.html" style="font-size:12px;color:var(--text3);text-decoration:none;font-weight:600;text-transform:uppercase;letter-spacing:.08em;transition:color .12s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">Blog</a>
    <a href="/contact.html" style="font-size:12px;color:var(--text3);text-decoration:none;font-weight:600;text-transform:uppercase;letter-spacing:.08em;transition:color .12s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">Contact</a>
    <a href="/privacy.html" style="font-size:12px;color:var(--text3);text-decoration:none;font-weight:600;text-transform:uppercase;letter-spacing:.08em;transition:color .12s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">Privacy</a>
    <a href="/terms.html" style="font-size:12px;color:var(--text3);text-decoration:none;font-weight:600;text-transform:uppercase;letter-spacing:.08em;transition:color .12s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">Terms</a>
  </div>
  <div style="font-size:11.5px;color:var(--text3);font-family:'DM Mono',monospace">© 2026 SG APK Apps — Not affiliated with Google LLC</div>
</footer>

<script>
const API = '';
let currentView = 'home';
let currentCat  = null;
let searchTimer = null;
let categories  = [];

(async function init() {
  await loadCategories();
  renderHome();
})();

async function loadCategories() {
  try {
    const r = await fetch(`${API}/api/categories`);
    const d = await r.json();
    categories = d.categories;
    const nav = document.getElementById('catNav');
    nav.innerHTML = categories.map(c => `
      <div class="sidebar-item" data-view="cat" data-cat="${c.id}" onclick="setView('cat','${c.id}')">
        <i class="ti ${c.icon}"></i>${c.label}
      </div>`).join('');
  } catch(e) { console.error(e); }
}

function setView(view, cat) {
  currentView = view;
  currentCat  = cat;
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active',
      el.dataset.view === view && (view !== 'cat' || el.dataset.cat === cat));
  });
  if(view === 'home')        renderHome();
  else if(view === 'top')    renderTopCharts('APPLICATION','TOP_FREE');
  else if(view === 'new')    renderTopCharts('APPLICATION','NEW_FREE');
  else if(cat === 'SGAPPS') renderOwnApps();
  else if(view === 'cat')    renderCategory(cat);
  window.scrollTo(0,0);
}

function goHome() { setView('home', null); return false; }

function handleSearchInput() {
  clearTimeout(searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  if(!q) { setView('home',null); return; }
  searchTimer = setTimeout(() => doSearch(), 420);
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  currentView = 'search';
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const main = document.getElementById('main');
  main.innerHTML = skeletonGrid(12);
  try {
    const r = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}&num=24`);
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    main.innerHTML = `
      <div class="section-hd">
        <div class="section-title"><i class="ti ti-search"></i>Results for "${q}" <span class="count-badge">${d.results.length}</span></div>
      </div>
      ${d.results.length === 0 ? emptyState('No apps found','Try different keywords') : ''}
      <div class="app-grid">${d.results.map(appCard).join('')}</div>`;
  } catch(e) {
    main.innerHTML = errorBanner(e.message);
  }
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  setView('home', null);
}

async function renderHome() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="hero">
      <div class="hero-grid">
        <div class="hero-content">
          <div class="hero-eyebrow">Trusted APK Source</div>
          <h1>Download Android APKs.<em>Safe &amp; Instant.</em></h1>
          <p>Live data from Google Play. Millions of free and paid apps, games, and tools — no account required.</p>
          <div class="hero-btns">
            <button class="hbtn hbtn-solid" onclick="setView('top',null)"><i class="ti ti-chart-bar"></i> Top Charts</button>
            <button class="hbtn hbtn-ghost" onclick="setView('new',null)"><i class="ti ti-sparkles"></i> New Releases</button>
          </div>
        </div>
        <div class="hero-stats">
          <div class="hstat"><div class="hstat-num">3M+</div><div class="hstat-lbl">Apps available</div></div>
          <div class="hstat"><div class="hstat-num">FREE</div><div class="hstat-lbl">No account needed</div></div>
          <div class="hstat"><div class="hstat-num">LIVE</div><div class="hstat-lbl">Real-time data</div></div>
          <div class="hstat"><div class="hstat-num">SAFE</div><div class="hstat-lbl">Play Store source</div></div>
        </div>
      </div>
    </div>

    <div class="section-hd">
      <div class="section-title"><i class="ti ti-layout-grid"></i>Categories</div>
    </div>
    <div class="cat-chips">
      ${categories.map(c=>`<div class="cat-chip" onclick="setView('cat','${c.id}')"><i class="ti ${c.icon}"></i>${c.label}</div>`).join('')}
    </div>

    <div class="section-hd" style="margin-top:32px">
      <div class="section-title"><i class="ti ti-chart-bar"></i>Top Free Apps</div>
      <button class="view-all" onclick="setView('top',null)">View all <i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="topFreeGrid">${skeletonGrid(6)}</div>

    <div class="section-hd">
      <div class="section-title"><i class="ti ti-device-gamepad-2"></i>Top Games</div>
      <button class="view-all" onclick="setView('cat','GAME')">View all <i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="topGamesGrid">${skeletonGrid(6)}</div>

    <div class="section-hd">
      <div class="section-title"><i class="ti ti-sparkles"></i>New Releases</div>
      <button class="view-all" onclick="setView('new',null)">View all <i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="newGrid">${skeletonGrid(6)}</div>
  `;

  Promise.all([
    fetchList('APPLICATION','TOP_FREE',6).then(apps => {
      const el = document.getElementById('topFreeGrid');
      if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
    }),
    fetchList('GAME','TOP_FREE',6).then(apps => {
      const el = document.getElementById('topGamesGrid');
      if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
    }),
    fetchList('APPLICATION','NEW_FREE',6).then(apps => {
      const el = document.getElementById('newGrid');
      if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
    }),
  ]).catch(console.error);
}

async function renderTopCharts(category, collection) {
  const main = document.getElementById('main');
  const colLabel = collection === 'NEW_FREE' ? 'New Releases' : 'Top Free';
  main.innerHTML = `
    <div class="section-hd">
      <div class="section-title"><i class="ti ti-chart-bar"></i>${colLabel}</div>
    </div>
    <div class="filter-pills">
      ${['TOP_FREE','TOP_PAID','NEW_FREE','NEW_PAID'].map(c=>`
        <button class="filter-pill ${c===collection?'active':''}" onclick="renderTopCharts('${category}','${c}')">
          ${c.replace('_',' ').toLowerCase().replace(/\b\w/g,x=>x.toUpperCase())}
        </button>`).join('')}
    </div>
    <div id="topListWrap">${skeletonList(20)}</div>`;
  try {
    const apps = await fetchList(category, collection, 30);
    const el = document.getElementById('topListWrap');
    if(el) el.innerHTML = `<div class="top-list">${apps.map((app,i)=>topItem(app,i)).join('')}</div>`;
  } catch(e) {
    const el = document.getElementById('topListWrap');
    if(el) el.innerHTML = errorBanner(e.message);
  }
}

async function renderCategory(catId) {
  const main = document.getElementById('main');
  const cat = categories.find(c=>c.id===catId) || { label: catId, icon:'ti-apps' };
  main.innerHTML = `
    <div class="section-hd">
      <div class="section-title"><i class="ti ${cat.icon}"></i>${cat.label}</div>
    </div>
    <div id="catGridWrap">${skeletonGrid(18)}</div>`;
  try {
    const apps = await fetchList(catId, 'TOP_FREE', 30);
    const el = document.getElementById('catGridWrap');
    if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
  } catch(e) {
    const el = document.getElementById('catGridWrap');
    if(el) el.innerHTML = errorBanner(e.message);
  }
}

async function renderOwnApps() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="section-hd">
      <div class="section-title"><i class="ti ti-brand-android"></i>SG APK Apps</div>
    </div>
    <div id="ownAppsGrid">${skeletonGrid(12)}</div>`;
  try {
    const r = await fetch('/api/sgappstech');
    const d = await r.json();
    document.getElementById('ownAppsGrid').innerHTML = `<div class="app-grid">${d.results.map(appCard).join('')}</div>`;
  } catch(e) {
    document.getElementById('ownAppsGrid').innerHTML = errorBanner(e.message);
  }
}

async function fetchList(category, collection, num) {
  const r = await fetch(`${API}/api/top?category=${category}&collection=${collection}&num=${num}`);
  const d = await r.json();
  if(d.error) throw new Error(d.error);
  return d.results;
}

function appCard(app) {
  const initial = (app.title||'?')[0].toUpperCase();
  const iconHtml = app.icon
    ? `<img class="app-card-icon" src="${app.icon}" alt="${esc(app.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="app-card-icon-ph" style="display:none">${initial}</div>`
    : `<div class="app-card-icon-ph">${initial}</div>`;
  const isFree = app.price === 'Free';
  return `
    <div class="app-card" onclick="openDetail('${esc(app.appId)}')">
      ${isFree ? '<span class="badge badge-free">FREE</span>' : `<span class="badge badge-top">${app.price}</span>`}
      ${iconHtml}
      <div class="app-card-name">${esc(app.title)}</div>
      <div class="app-card-dev">${esc(app.developer)}</div>
      <div class="app-card-meta">
        <div class="rating"><i class="ti ti-star-filled"></i>${app.score}</div>
        <div class="app-price ${isFree?'':'paid'}">${app.price}</div>
      </div>
      <button class="btn-dl" onclick="event.stopPropagation();quickDownload(this,'${esc(app.title)}','${esc(app.url)}')">
        <i class="ti ti-download"></i> Download
      </button>
    </div>`;
}

function topItem(app, i) {
  const initial = (app.title||'?')[0].toUpperCase();
  const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'';
  const iconHtml = app.icon
    ? `<img class="top-icon" src="${app.icon}" alt="${esc(app.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="top-icon-ph" style="display:none">${initial}</div>`
    : `<div class="top-icon-ph">${initial}</div>`;
  return `
    <div class="top-item" onclick="openDetail('${esc(app.appId)}')">
      <span class="top-rank ${rankClass}">${i+1}</span>
      ${iconHtml}
      <div class="top-info">
        <div class="top-name">${esc(app.title)}</div>
        <div class="top-sub">
          <span><i class="ti ti-star-filled" style="color:var(--gold);font-size:10px"></i> ${app.score}</span>
          <span>·</span><span>${esc(app.genre)}</span>
          <span>·</span><span>${app.installs}</span>
        </div>
      </div>
      <div class="top-actions">
        <span style="font-size:11px;font-weight:700;color:${app.price==='Free'?'var(--green)':'var(--accent2)'};font-family:'DM Mono',monospace">${app.price}</span>
        <button class="btn-small-dl" onclick="event.stopPropagation();quickDownload(this,'${esc(app.title)}','${esc(app.url)}')">
          <i class="ti ti-download"></i> APK
        </button>
      </div>
    </div>`;
}

async function openDetail(appId) {
  const overlay = document.getElementById('overlay');
  const modal   = document.getElementById('detailModal');
  overlay.classList.add('open');
  modal.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text3)">
    <i class="ti ti-loader-2" style="font-size:28px;display:block;margin-bottom:10px;animation:spin 1s linear infinite;color:var(--accent)"></i>
    Loading…
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

  try {
    const [appRes, reviewRes] = await Promise.all([
      fetch(`${API}/api/app/${encodeURIComponent(appId)}`),
      fetch(`${API}/api/reviews/${encodeURIComponent(appId)}`),
    ]);
    const app     = await appRes.json();
    const revData = await reviewRes.json().catch(()=>({reviews:[]}));
    if(app.error) throw new Error(app.error);

    const initial  = (app.title||'?')[0].toUpperCase();
    const isFree   = app.price === 'Free';
    const iconHtml = app.icon
      ? `<img class="detail-icon" src="${app.icon}" alt="${esc(app.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="detail-icon-ph" style="display:none">${initial}</div>`
      : `<div class="detail-icon-ph">${initial}</div>`;

    const screenshots = (app.screenshots||[]).slice(0,8).map(s=>
      `<img src="${s}" alt="screenshot" loading="lazy">`).join('');

    const reviews = (revData.reviews||[]).slice(0,3).map(r=>`
      <div class="review-card">
        <div class="review-head">
          <div class="review-avatar">${(r.userName||'U')[0].toUpperCase()}</div>
          <div>
            <div class="review-name">${esc(r.userName||'User')}</div>
            <div class="review-stars">${'<i class="ti ti-star-filled"></i>'.repeat(r.score||5)}</div>
          </div>
        </div>
        <div class="review-text">${esc((r.text||'').substring(0,200))}${(r.text||'').length>200?'…':''}</div>
      </div>`).join('');

    modal.innerHTML = `
      <div class="detail-hero">
        <button class="close-modal" onclick="closeDetail()"><i class="ti ti-x"></i></button>
        <div class="detail-hero-inner">
          ${iconHtml}
          <div>
            <div class="detail-title">${esc(app.title)}</div>
            <div class="detail-dev">by ${esc(app.developer)}</div>
            <div class="detail-tags">
              <span class="detail-tag">${isFree?'Free':app.price}</span>
              <span class="detail-tag">${esc(app.genre)}</span>
              <span class="detail-tag">${esc(app.contentRating)}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="detail-body">
        <div class="stat-row">
          <div class="stat-card"><span class="stat-val">⭐ ${app.score}</span><span class="stat-lbl">Rating</span></div>
          <div class="stat-card"><span class="stat-val">${app.installs}</span><span class="stat-lbl">Installs</span></div>
          <div class="stat-card"><span class="stat-val">${app.size||'—'}</span><span class="stat-lbl">Size</span></div>
          <div class="stat-card"><span class="stat-val">${app.version||'—'}</span><span class="stat-lbl">Version</span></div>
        </div>
        <div class="dl-section">
          <button class="btn-dl-big" onclick="quickDownload(this,'${esc(app.title)}','${esc(app.url)}')">
            <i class="ti ti-download"></i> Download APK
          </button>
          <a href="${app.url}" target="_blank" rel="noopener">
            <button class="btn-play"><i class="ti ti-brand-google-play"></i> Play Store</button>
          </a>
        </div>
        <div class="detail-section-title">About</div>
        <div class="detail-desc clamped" id="descText">${esc(app.description||app.summary||'No description available.')}</div>
        <button class="read-more" id="readMoreBtn" onclick="toggleDesc()">Read more ▼</button>
        ${screenshots ? `<div class="detail-section-title">Screenshots</div><div class="screenshots-row">${screenshots}</div>` : ''}
        <div class="detail-section-title">App Info</div>
        <div class="info-grid">
          <div class="info-row"><div class="info-key">Developer</div><div class="info-val">${esc(app.developer)}</div></div>
          <div class="info-row"><div class="info-key">Updated</div><div class="info-val">${esc(app.updated||'—')}</div></div>
          <div class="info-row"><div class="info-key">Android</div><div class="info-val">${esc(app.androidVersion||'—')}</div></div>
          <div class="info-row"><div class="info-key">Price</div><div class="info-val">${esc(app.price)}</div></div>
        </div>
        ${reviews ? `<div class="detail-section-title">Reviews</div><div class="reviews-list">${reviews}</div>` : ''}
        <div id="similarWrap"></div>
      </div>`;

    fetch(`${API}/api/similar/${encodeURIComponent(appId)}`)
      .then(r=>r.json())
      .then(d=>{
        const el = document.getElementById('similarWrap');
        if(!el||!d.results||!d.results.length) return;
        el.innerHTML = `
          <div class="detail-section-title" style="margin-top:8px">Similar Apps</div>
          <div class="similar-grid">${d.results.map(a=>{
            const ini = (a.title||'?')[0].toUpperCase();
            const ico = a.icon
              ? `<img class="similar-icon" src="${a.icon}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="similar-icon-ph" style="display:none">${ini}</div>`
              : `<div class="similar-icon-ph">${ini}</div>`;
            return `<div class="similar-card" onclick="closeDetail();setTimeout(()=>openDetail('${esc(a.appId)}'),200)">
              ${ico}
              <div class="similar-name">${esc(a.title)}</div>
              <div class="similar-rating"><i class="ti ti-star-filled"></i>${a.score}</div>
            </div>`;
          }).join('')}</div>`;
      }).catch(()=>{});

  } catch(e) {
    modal.innerHTML = `${errorBanner(e.message)}<button class="btn-dl" style="margin:0 22px 22px;width:calc(100% - 44px)" onclick="closeDetail()">Close</button>`;
  }
}

function closeDetail() { document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e) { if(e.target===document.getElementById('overlay')) closeDetail(); }
function toggleDesc() {
  const el  = document.getElementById('descText');
  const btn = document.getElementById('readMoreBtn');
  if(!el) return;
  el.classList.toggle('clamped');
  btn.textContent = el.classList.contains('clamped') ? 'Read more ▼' : 'Show less ▲';
}

function quickDownload(btn, name, url) {
  const orig = btn.innerHTML;
  btn.innerHTML = '<i class="ti ti-check"></i> Downloading…';
  btn.classList.add('success');
  setTimeout(()=>{ btn.innerHTML=orig; btn.classList.remove('success'); }, 2200);
  showToast(`Opening ${name}…`);
  if(url) window.open(url, '_blank', 'noopener');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function skeletonGrid(n) {
  return `<div class="app-grid">${Array(n).fill(`
    <div class="skel-card">
      <div class="skeleton skel-icon"></div>
      <div class="skeleton skel-line w80"></div>
      <div class="skeleton skel-line w60"></div>
      <div class="skeleton skel-line w40"></div>
    </div>`).join('')}</div>`;
}

function skeletonList(n) {
  return `<div class="top-list">${Array(n).fill(`
    <div class="top-item">
      <div class="skeleton" style="width:24px;height:18px;border-radius:3px"></div>
      <div class="skeleton top-icon"></div>
      <div style="flex:1"><div class="skeleton skel-line w80" style="margin-bottom:6px"></div><div class="skeleton skel-line w50"></div></div>
    </div>`).join('')}</div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function errorBanner(msg) {
  return `<div class="error-banner"><i class="ti ti-alert-triangle" style="font-size:16px;flex-shrink:0"></i>
    <div><strong>Could not load apps.</strong> Make sure the server is running.<br>
    <span style="font-size:12px;opacity:.75">${esc(msg)}</span></div></div>`;
}

function emptyState(title, sub) {
  return `<div class="empty-state"><i class="ti ti-search-off"></i><h3>${title}</h3><p>${sub}</p></div>`;
}
</script>
</body>
</html>
