<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG APK Apps - Android APK Store</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#f5f7ff;
  --surface:#ffffff;
  --surface2:#f0f2ff;
  --border:#e2e6ff;
  --purple:#6c63ff;
  --purple-light:#ede9ff;
  --pink:#ff6b9d;
  --pink-light:#ffe0ed;
  --orange:#ff8c42;
  --orange-light:#fff0e5;
  --teal:#00c2a0;
  --teal-light:#e0faf5;
  --blue:#3b9eff;
  --blue-light:#e5f3ff;
  --gold:#f59e0b;
  --text:#1a1a2e;
  --text2:#5a5c78;
  --text3:#9496b0;
  --shadow:0 2px 16px rgba(108,99,255,.10);
  --shadow-hover:0 8px 32px rgba(108,99,255,.18);
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

/* ── Header ──────────────────────────────────────────────────────────────── */
.header{background:#fff;border-bottom:2px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:64px;position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(108,99,255,.07)}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px;white-space:nowrap;color:var(--purple);text-decoration:none;letter-spacing:-.4px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#6c63ff,#ff6b9d);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;box-shadow:0 4px 12px rgba(108,99,255,.35)}
.logo span{color:var(--text)}

/* ── Search ──────────────────────────────────────────────────────────────── */
.search-wrap{flex:1;max-width:500px;position:relative}
.search-wrap i.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.search-wrap input{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:14px;padding:10px 40px 10px 42px;font-size:14px;outline:none;color:var(--text);transition:all .15s;font-weight:500}
.search-wrap input::placeholder{color:var(--text3);font-weight:400}
.search-wrap input:focus{border-color:var(--purple);box-shadow:0 0 0 4px rgba(108,99,255,.12);background:#fff}
.search-wrap .clear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:15px;display:none;padding:4px}
.search-wrap input:not(:placeholder-shown) ~ .clear-btn{display:block}

/* ── Header Nav ──────────────────────────────────────────────────────────── */
.header-nav{display:flex;align-items:center;gap:4px;margin-left:auto}
.nav-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text2);transition:all .15s}
.nav-btn:hover{background:var(--purple-light);color:var(--purple)}
.nav-btn.primary{background:linear-gradient(135deg,#6c63ff,#ff6b9d);color:#fff;padding:9px 20px;font-weight:700;box-shadow:0 4px 14px rgba(108,99,255,.35)}
.nav-btn.primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.45)}

/* ── Layout ──────────────────────────────────────────────────────────────── */
.layout{display:flex;min-height:calc(100vh - 64px)}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
.sidebar{width:214px;flex-shrink:0;background:#fff;border-right:2px solid var(--border);padding:16px 8px 24px;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}
.sidebar-label{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;padding:14px 12px 6px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;font-size:13.5px;cursor:pointer;color:var(--text2);border-radius:10px;margin-bottom:2px;transition:all .12s;user-select:none;font-weight:500}
.sidebar-item:hover{background:var(--purple-light);color:var(--purple)}
.sidebar-item.active{background:linear-gradient(90deg,var(--purple-light),#f5f3ff);color:var(--purple);font-weight:700;box-shadow:inset 3px 0 0 var(--purple)}
.sidebar-item i{font-size:16px;flex-shrink:0}
.sidebar-divider{border:none;border-top:2px solid var(--border);margin:10px 4px}

/* ── Main ────────────────────────────────────────────────────────────────── */
.main{flex:1;min-width:0;padding:26px 30px 52px}

/* ── Hero Banner ─────────────────────────────────────────────────────────── */
.hero{background:linear-gradient(135deg,#6c63ff 0%,#a78bfa 45%,#ff6b9d 100%);border-radius:20px;padding:36px 40px;color:#fff;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:24px;overflow:hidden;position:relative;box-shadow:0 8px 40px rgba(108,99,255,.3)}
.hero::before{content:'';position:absolute;top:-60px;right:120px;width:260px;height:260px;background:rgba(255,255,255,.08);border-radius:50%}
.hero::after{content:'';position:absolute;bottom:-80px;right:-40px;width:220px;height:220px;background:rgba(255,107,157,.15);border-radius:50%}
.hero-content{position:relative;z-index:1}
.hero-eyebrow{font-size:11px;font-weight:700;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.14em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.hero h1{font-size:28px;font-weight:800;margin-bottom:10px;line-height:1.2;letter-spacing:-.5px}
.hero p{font-size:14px;color:rgba(255,255,255,.82);line-height:1.7;max-width:420px}
.hero-btns{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.hero-btn{display:flex;align-items:center;gap:7px;padding:11px 22px;border-radius:12px;font-size:13.5px;font-weight:700;cursor:pointer;transition:all .15s}
.hero-btn.solid{background:#fff;color:var(--purple);border:none;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.hero-btn.solid:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.hero-btn.outline{background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.4)}
.hero-btn.outline:hover{background:rgba(255,255,255,.25)}
.hero-art{font-size:90px;flex-shrink:0;line-height:1;position:relative;z-index:1;filter:drop-shadow(0 8px 24px rgba(0,0,0,.2))}

/* ── Stats Bar ───────────────────────────────────────────────────────────── */
.stats-bar{display:flex;gap:0;background:#fff;border:2px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:26px;box-shadow:var(--shadow)}
.stat-item{flex:1;padding:16px 0;text-align:center;border-right:2px solid var(--border)}
.stat-item:last-child{border-right:none}
.stat-num{font-size:18px;font-weight:800;color:var(--purple);display:block}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}

/* ── Section headers ─────────────────────────────────────────────────────── */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;margin-top:32px}
.section-hd:first-child{margin-top:0}
.section-title{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px;color:var(--text)}
.section-title i{font-size:18px;color:var(--purple)}
.count-badge{font-size:11.5px;font-weight:700;color:var(--text3);background:var(--surface2);padding:2px 10px;border-radius:20px;border:2px solid var(--border)}
.view-all{font-size:13px;color:var(--purple);cursor:pointer;display:flex;align-items:center;gap:3px;border:none;background:none;font-family:inherit;font-weight:700}
.view-all:hover{color:var(--pink)}

/* ── Category chips ──────────────────────────────────────────────────────── */
.cat-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.cat-chip{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:20px;border:2px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--text2);transition:all .15s;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.cat-chip:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-light);transform:translateY(-1px)}
.cat-chip i{font-size:15px}

/* ── App Grid ────────────────────────────────────────────────────────────── */
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(162px,1fr));gap:14px}
.app-card{background:#fff;border:2px solid var(--border);border-radius:16px;padding:16px 14px 12px;cursor:pointer;transition:all .2s;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.app-card:hover{border-color:var(--purple);transform:translateY(-4px);box-shadow:var(--shadow-hover)}
.app-card-icon{width:58px;height:58px;border-radius:14px;object-fit:cover;margin-bottom:11px}
.app-card-icon-placeholder{width:58px;height:58px;border-radius:14px;margin-bottom:11px;background:linear-gradient(135deg,#6c63ff,#ff6b9d);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800}
.app-card-name{font-size:13px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.app-card-dev{font-size:11.5px;color:var(--text3);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rating{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--text2);font-weight:500}
.rating i{font-size:11px;color:var(--gold)}
.app-price{font-size:12px;font-weight:700;color:var(--teal)}
.app-price.paid{color:var(--purple)}
.btn-dl{width:100%;padding:8px;background:var(--purple-light);color:var(--purple);border:2px solid transparent;border-radius:10px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .12s}
.btn-dl:hover{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-dl.success{background:var(--teal-light);color:var(--teal);pointer-events:none}
.badge{position:absolute;top:10px;right:10px;font-size:10px;padding:3px 8px;border-radius:20px;font-weight:800;letter-spacing:.02em}
.badge-new{background:var(--teal-light);color:var(--teal)}
.badge-top{background:var(--orange-light);color:var(--orange)}
.badge-free{background:var(--purple-light);color:var(--purple)}

/* ── Top Charts List ─────────────────────────────────────────────────────── */
.top-list{background:#fff;border:2px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.top-item{display:flex;align-items:center;gap:14px;padding:13px 18px;cursor:pointer;transition:background .1s}
.top-item:hover{background:var(--bg)}
.top-item+.top-item{border-top:2px solid var(--border)}
.top-rank{font-size:16px;font-weight:800;width:28px;text-align:center;flex-shrink:0;color:var(--text3)}
.top-rank.r1{color:var(--gold)}
.top-rank.r2{color:#9E9E9E}
.top-rank.r3{color:#CD7F32}
.top-icon{width:46px;height:46px;border-radius:12px;object-fit:cover;flex-shrink:0}
.top-icon-ph{width:46px;height:46px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,#6c63ff,#ff6b9d);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800}
.top-info{flex:1;min-width:0}
.top-name{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.top-sub{font-size:12px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:6px}
.top-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-small-dl{padding:7px 15px;background:var(--purple-light);color:var(--purple);border:none;border-radius:10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;transition:all .12s}
.btn-small-dl:hover{background:var(--purple);color:#fff}

/* ── Detail Modal ────────────────────────────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,.5);backdrop-filter:blur(8px);z-index:400;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.overlay.open{display:flex}
.detail-modal{background:#fff;border:2px solid var(--border);border-radius:22px;width:100%;max-width:700px;margin:auto;box-shadow:0 24px 80px rgba(108,99,255,.2);overflow:hidden}
.detail-hero{background:linear-gradient(135deg,#6c63ff,#a78bfa,#ff6b9d);padding:28px;color:#fff;position:relative}
.detail-hero-inner{display:flex;gap:20px;align-items:flex-start;position:relative;z-index:1}
.detail-icon{width:82px;height:82px;border-radius:20px;object-fit:cover;flex-shrink:0;border:3px solid rgba(255,255,255,.5)}
.detail-icon-ph{width:82px;height:82px;border-radius:20px;flex-shrink:0;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;border:3px solid rgba(255,255,255,.4)}
.detail-title{font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-.4px}
.detail-dev{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:10px}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap}
.detail-tag{font-size:11.5px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;font-weight:600}
.close-modal{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);color:#fff;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;z-index:2;transition:background .12s}
.close-modal:hover{background:rgba(255,255,255,.35)}

.detail-body{padding:24px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.stat-card{text-align:center;background:var(--bg);border:2px solid var(--border);border-radius:14px;padding:14px 6px}
.stat-val{font-size:17px;font-weight:800;display:block;color:var(--text)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:3px;display:block;text-transform:uppercase;letter-spacing:.05em;font-weight:600}

.dl-section{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-bottom:24px}
.btn-dl-big{padding:14px 20px;background:linear-gradient(135deg,#6c63ff,#ff6b9d);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;width:100%;box-shadow:0 4px 16px rgba(108,99,255,.35)}
.btn-dl-big:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(108,99,255,.45)}
.btn-play{padding:14px 16px;background:var(--bg);color:var(--text);border:2px solid var(--border);border-radius:14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:all .15s}
.btn-play:hover{border-color:var(--purple);color:var(--purple)}

.detail-section-title{font-size:12px;font-weight:800;margin-bottom:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.detail-desc{font-size:13.5px;line-height:1.8;color:var(--text2);margin-bottom:22px;white-space:pre-line}
.detail-desc.clamped{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.read-more{font-size:13px;color:var(--purple);border:none;background:none;padding:0;margin-bottom:24px;display:block;cursor:pointer;font-family:inherit;font-weight:700}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
.info-row{background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:12px 14px}
.info-key{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:700}
.info-val{font-size:13px;font-weight:700;color:var(--text)}

.screenshots-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-bottom:22px;scrollbar-width:thin}
.screenshots-row img{height:180px;border-radius:14px;flex-shrink:0;border:2px solid var(--border);object-fit:cover}

.reviews-list{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
.review-card{background:var(--bg);border:2px solid var(--border);border-radius:14px;padding:14px 16px}
.review-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.review-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#ff6b9d);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.review-name{font-size:13px;font-weight:700;color:var(--text)}
.review-stars{display:flex;gap:1px;margin-top:2px}
.review-stars i{font-size:11px;color:var(--gold)}
.review-text{font-size:13px;color:var(--text2);line-height:1.65}

.similar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.similar-card{cursor:pointer;text-align:center;padding:10px 6px;border-radius:14px;transition:all .12s;border:2px solid transparent}
.similar-card:hover{background:var(--purple-light);border-color:var(--border)}
.similar-icon{width:52px;height:52px;border-radius:14px;object-fit:cover;margin:0 auto 7px}
.similar-icon-ph{width:52px;height:52px;border-radius:14px;margin:0 auto 7px;background:linear-gradient(135deg,#6c63ff,#ff6b9d);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:800}
.similar-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.similar-rating{font-size:11px;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:2px;margin-top:2px}
.similar-rating i{font-size:10px;color:var(--gold)}

/* ── Loading skeleton ────────────────────────────────────────────────────── */
.skeleton{background:linear-gradient(90deg,#eef0ff 25%,#e4e6ff 50%,#eef0ff 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:10px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:#fff;border:2px solid var(--border);border-radius:16px;padding:16px 14px}
.skel-icon{width:58px;height:58px;border-radius:14px;margin-bottom:11px}
.skel-line{height:12px;border-radius:6px;margin-bottom:7px}
.skel-line.w80{width:80%}.skel-line.w60{width:60%}.skel-line.w40{width:40%}

/* ── Toast ───────────────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#fff;border:2px solid var(--border);color:var(--text);padding:12px 26px;border-radius:14px;font-size:13.5px;z-index:600;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(108,99,255,.2);font-weight:600}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast i{color:var(--teal)}

/* ── Empty / Error ───────────────────────────────────────────────────────── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state i{font-size:52px;display:block;margin-bottom:14px;color:var(--border)}
.empty-state h3{font-size:16px;color:var(--text2);margin-bottom:6px;font-weight:700}
.empty-state p{font-size:13.5px}
.error-banner{background:#fff5f5;border:2px solid #fecaca;border-radius:14px;padding:14px 18px;font-size:13.5px;color:#ef4444;display:flex;align-items:center;gap:10px;margin-bottom:20px;font-weight:500}

/* ── Filter pills ────────────────────────────────────────────────────────── */
.filter-pills{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.filter-pill{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;border:2px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;transition:all .12s}
.filter-pill:hover{border-color:var(--purple);color:var(--purple)}
.filter-pill.active{background:var(--purple);border-color:var(--purple);color:#fff;box-shadow:0 2px 12px rgba(108,99,255,.35)}

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:14px 16px 40px}
  .header{padding:0 14px;gap:10px}
  .logo span{display:none}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .dl-section{grid-template-columns:1fr}
  .stats-bar{display:none}
  .hero{padding:26px 22px}
  .hero h1{font-size:22px}
  .nav-btn:not(.primary){display:none}
}
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="header">
  <a class="logo" href="#" onclick="goHome()">
    <div class="logo-icon"><i class="ti ti-device-mobile-down"></i></div>
    SG APK<span> Apps</span>
  </a>
  <div class="search-wrap">
    <i class="ti ti-search search-icon"></i>
    <input type="text" id="searchInput" placeholder="Search apps, games, APKs…"
           oninput="handleSearchInput()" onkeydown="if(event.key==='Enter')doSearch()">
    <button class="clear-btn ti ti-x" onclick="clearSearch()"></button>
  </div>
  <div class="header-nav">
    <button class="nav-btn" onclick="setView('top',null)"><i class="ti ti-chart-bar"></i> Top Charts</button>
    <a class="nav-btn" href="/blog.html" style="text-decoration:none"><i class="ti ti-news"></i> Blog</a>
    <a class="nav-btn" href="/about.html" style="text-decoration:none"><i class="ti ti-info-circle"></i> About</a>
    <button class="nav-btn primary"><i class="ti ti-download"></i> Get APK</button>
  </div>
</header>

<!-- ── Layout ───────────────────────────────────────────────────────────────── -->
<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">Discover</div>
    <div class="sidebar-item active" data-view="home" onclick="setView('home',null)"><i class="ti ti-home"></i>Home</div>
    <div class="sidebar-item" data-view="top" onclick="setView('top',null)"><i class="ti ti-chart-bar"></i>Top Charts</div>
    <div class="sidebar-item" data-view="new" onclick="setView('new',null)"><i class="ti ti-sparkles"></i>New Releases</div>
    <hr class="sidebar-divider">
    <div class="sidebar-label">Categories</div>
    <div id="catNav">
      <!-- injected by JS -->
    </div>
  </nav>

  <!-- Main -->
  <main class="main" id="main"></main>
</div>

<!-- ── App Detail Modal ──────────────────────────────────────────────────────── -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="detail-modal" id="detailModal"></div>
</div>

<!-- ── Toast ─────────────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toastMsg"></span></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
const API = '';  // same origin
let currentView = 'home';
let currentCat  = null;
let searchTimer = null;
let categories  = [];

// ── Init ───────────────────────────────────────────────────────────────────────
(async function init() {
  await loadCategories();
  renderHome();
})();

// ── Categories ─────────────────────────────────────────────────────────────────
async function loadCategories() {
  try {
    const r = await fetch(`${API}/api/categories`);
    const d = await r.json();
    categories = d.categories;
    const nav = document.getElementById('catNav');
    nav.innerHTML = categories.map(c => `
      <div class="sidebar-item" data-view="cat" data-cat="${c.id}" onclick="setView('cat','${c.id}')">
        <i class="ti ${c.icon}"></i>${c.label}
      </div>`).join('');
  } catch(e) { console.error(e); }
}

// ── Navigation ─────────────────────────────────────────────────────────────────
function setView(view, cat) {
  currentView = view;
  currentCat  = cat;
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active',
      el.dataset.view === view && (view !== 'cat' || el.dataset.cat === cat));
  });
  if(view === 'home')   renderHome();
  else if(view === 'top') renderTopCharts('APPLICATION', 'TOP_FREE');
  else if(view === 'new') renderTopCharts('APPLICATION', 'NEW_FREE');
  else if(cat === 'SGAPPS') {
    renderOwnApps();
  }
  else if(view === 'cat') renderCategory(cat);
  window.scrollTo(0,0);
}

function goHome() { setView('home', null); return false; }

// ── Search ─────────────────────────────────────────────────────────────────────
function handleSearchInput() {
  clearTimeout(searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { setView('home',null); return; }
  searchTimer = setTimeout(() => doSearch(), 420);
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  currentView = 'search';
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const main = document.getElementById('main');
  main.innerHTML = skeletonGrid(12) + '';
  renderSectionHeader(main, `Search results for "${q}"`, null, '');
  try {
    const r = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}&num=24`);
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    main.innerHTML = `
      <div class="section-hd">
        <div class="section-title"><i class="ti ti-search"></i>Results for "${q}" <span class="count-badge">${d.results.length}</span></div>
      </div>
      ${d.results.length === 0 ? emptyState('No apps found', 'Try different keywords') : ''}
      <div class="app-grid">${d.results.map(appCard).join('')}</div>`;
  } catch(e) {
    main.innerHTML = errorBanner(e.message);
  }
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  setView('home', null);
}

// ── Home ───────────────────────────────────────────────────────────────────────
async function renderHome() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="hero">
      <div class="hero-content">
        <div class="hero-eyebrow"><i class="ti ti-shield-check"></i> Trusted APK Source</div>
        <h1>Download <span>Android APKs</span><br>Safe & Fast</h1>
        <p>Millions of free and paid apps, games and tools — pulled live from the Google Play Store and delivered straight to your device.</p>
        <div class="hero-btns">
          <button class="hero-btn solid" onclick="setView('top',null)"><i class="ti ti-chart-bar"></i> Top Charts</button>
          <button class="hero-btn outline" onclick="setView('new',null)"><i class="ti ti-sparkles"></i> New Releases</button>
        </div>
      </div>
      <div class="hero-art">📲</div>
    </div>

    <div class="stats-bar">
      <div class="stat-item"><span class="stat-num">3M+</span><div class="stat-sub">Apps Available</div></div>
      <div class="stat-item"><span class="stat-num">Free</span><div class="stat-sub">No Account Needed</div></div>
      <div class="stat-item"><span class="stat-num">Live</span><div class="stat-sub">Real-time Data</div></div>
      <div class="stat-item"><span class="stat-num">Safe</span><div class="stat-sub">Play Store Source</div></div>
    </div>

    <div class="section-hd">
      <div class="section-title"><i class="ti ti-layout-grid"></i>Browse Categories</div>
    </div>
    <div class="cat-chips">
      ${categories.map(c=>`<div class="cat-chip" onclick="setView('cat','${c.id}')"><i class="ti ${c.icon}"></i>${c.label}</div>`).join('')}
    </div>

    <div class="section-hd" style="margin-top:32px">
      <div class="section-title"><i class="ti ti-chart-bar"></i>Top Free Apps</div>
      <button class="view-all" onclick="setView('top',null)">View all <i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="topFreeGrid">${skeletonGrid(6)}</div>

    <div class="section-hd">
      <div class="section-title"><i class="ti ti-device-gamepad-2"></i>Top Games</div>
      <button class="view-all" onclick="setView('cat','GAME')">View all <i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="topGamesGrid">${skeletonGrid(6)}</div>

    <div class="section-hd">
      <div class="section-title"><i class="ti ti-sparkles"></i>New Releases</div>
      <button class="view-all" onclick="setView('new',null)">View all <i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="newGrid">${skeletonGrid(6)}</div>
  `;

  // load sections in parallel
  Promise.all([
    fetchList('APPLICATION','TOP_FREE',6).then(apps => {
      const el = document.getElementById('topFreeGrid');
      if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
    }),
    fetchList('GAME','TOP_FREE',6).then(apps => {
      const el = document.getElementById('topGamesGrid');
      if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
    }),
    fetchList('APPLICATION','NEW_FREE',6).then(apps => {
      const el = document.getElementById('newGrid');
      if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
    }),
  ]).catch(console.error);
}

// ── Top Charts ─────────────────────────────────────────────────────────────────
async function renderTopCharts(category, collection) {
  const main = document.getElementById('main');
  const colLabel = collection === 'NEW_FREE' ? 'New Releases' : 'Top Free';
  main.innerHTML = `
    <div class="section-hd">
      <div class="section-title"><i class="ti ti-chart-bar"></i>${colLabel}</div>
    </div>
    <div class="filter-pills">
      ${['TOP_FREE','TOP_PAID','NEW_FREE','NEW_PAID'].map(c=>`
        <button class="filter-pill ${c===collection?'active':''}" onclick="renderTopCharts('${category}','${c}')">
          ${c.replace('_',' ').toLowerCase().replace(/\b\w/g,x=>x.toUpperCase())}
        </button>`).join('')}
    </div>
    <div id="topListWrap">${skeletonList(20)}</div>`;

  try {
    const apps = await fetchList(category, collection, 30);
    const el = document.getElementById('topListWrap');
    if(el) el.innerHTML = `<div class="top-list">${apps.map((app,i)=>topItem(app,i)).join('')}</div>`;
  } catch(e) {
    const el = document.getElementById('topListWrap');
    if(el) el.innerHTML = errorBanner(e.message);
  }
}

// ── Category ───────────────────────────────────────────────────────────────────
async function renderCategory(catId) {
  const main = document.getElementById('main');
  const cat = categories.find(c=>c.id===catId) || { label: catId, icon:'ti-apps' };
  main.innerHTML = `
    <div class="section-hd">
      <div class="section-title"><i class="ti ${cat.icon}"></i>${cat.label}</div>
    </div>
    <div id="catGridWrap">${skeletonGrid(18)}</div>`;
  try {
    const apps = await fetchList(catId, 'TOP_FREE', 30);
    const el = document.getElementById('catGridWrap');
    if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
  } catch(e) {
    const el = document.getElementById('catGridWrap');
    if(el) el.innerHTML = errorBanner(e.message);
  }
}

async function renderOwnApps() {
  const main = document.getElementById('main');

  main.innerHTML = `
    <div class="section-hd">
      <div class="section-title">
        <i class="ti ti-brand-android"></i>
        SG APK Apps
      </div>
    </div>
    <div id="ownAppsGrid">${skeletonGrid(12)}</div>
  `;

  try {
    const r = await fetch('/api/sgappstech');
    const d = await r.json();

    document.getElementById('ownAppsGrid').innerHTML = `
      <div class="app-grid">
        ${d.results.map(appCard).join('')}
      </div>
    `;
  } catch (e) {
    document.getElementById('ownAppsGrid').innerHTML =
      errorBanner(e.message);
  }
}

// ── Fetch helpers ──────────────────────────────────────────────────────────────
async function fetchList(category, collection, num) {
  const r = await fetch(`${API}/api/top?category=${category}&collection=${collection}&num=${num}`);
  const d = await r.json();
  if(d.error) throw new Error(d.error);
  return d.results;
}

// ── App Card ───────────────────────────────────────────────────────────────────
function appCard(app) {
  const initial = (app.title||'?')[0].toUpperCase();
  const iconHtml = app.icon
    ? `<img class="app-card-icon" src="${app.icon}" alt="${esc(app.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    + `<div class="app-card-icon-placeholder" style="display:none">${initial}</div>`
    : `<div class="app-card-icon-placeholder">${initial}</div>`;
  const isFree = app.price === 'Free';
  return `
    <div class="app-card" onclick="openDetail('${esc(app.appId)}')">
      ${isFree ? '<span class="badge badge-free">FREE</span>' : `<span class="badge badge-top">${app.price}</span>`}
      ${iconHtml}
      <div class="app-card-name">${esc(app.title)}</div>
      <div class="app-card-dev">${esc(app.developer)}</div>
      <div class="app-card-meta">
        <div class="rating"><i class="ti ti-star-filled"></i>${app.score}</div>
        <div class="app-price ${isFree?'free':''}">${app.price}</div>
      </div>
      <button class="btn-dl" onclick="event.stopPropagation();quickDownload(this,'${esc(app.title)}','${esc(app.url)}')">
        <i class="ti ti-download"></i> Download
      </button>
    </div>`;
}

// ── Top Chart Item ─────────────────────────────────────────────────────────────
function topItem(app, i) {
  const initial = (app.title||'?')[0].toUpperCase();
  const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'';
  const iconHtml = app.icon
    ? `<img class="top-icon" src="${app.icon}" alt="${esc(app.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    + `<div class="top-icon-ph" style="display:none">${initial}</div>`
    : `<div class="top-icon-ph">${initial}</div>`;
  return `
    <div class="top-item" onclick="openDetail('${esc(app.appId)}')">
      <span class="top-rank ${rankClass}">${i+1}</span>
      ${iconHtml}
      <div class="top-info">
        <div class="top-name">${esc(app.title)}</div>
        <div class="top-sub">
          <span><i class="ti ti-star-filled" style="color:#F9AB00;font-size:11px"></i> ${app.score}</span>
          <span>·</span><span>${esc(app.genre)}</span>
          <span>·</span><span>${app.installs}</span>
        </div>
      </div>
      <div class="top-actions">
        <span style="font-size:12px;font-weight:600;color:${app.price==='Free'?'#00c2a0':'#6c63ff'}">${app.price}</span>
        <button class="btn-small-dl" onclick="event.stopPropagation();quickDownload(this,'${esc(app.title)}','${esc(app.url)}')">
          <i class="ti ti-download"></i> APK
        </button>
      </div>
    </div>`;
}

// ── App Detail ─────────────────────────────────────────────────────────────────
async function openDetail(appId) {
  const overlay = document.getElementById('overlay');
  const modal   = document.getElementById('detailModal');
  overlay.classList.add('open');
  modal.innerHTML = `<div style="padding:40px;text-align:center;color:#888">
    <i class="ti ti-loader-2" style="font-size:32px;display:block;margin-bottom:10px;animation:spin 1s linear infinite"></i>
    Loading app details…
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

  try {
    const [appRes, reviewRes] = await Promise.all([
      fetch(`${API}/api/app/${encodeURIComponent(appId)}`),
      fetch(`${API}/api/reviews/${encodeURIComponent(appId)}`),
    ]);
    const app     = await appRes.json();
    const revData = await reviewRes.json().catch(()=>({reviews:[]}));
    if(app.error) throw new Error(app.error);

    const initial   = (app.title||'?')[0].toUpperCase();
    const isFree    = app.price === 'Free';
    const iconHtml  = app.icon
      ? `<img class="detail-icon" src="${app.icon}" alt="${esc(app.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="detail-icon-ph" style="display:none">${initial}</div>`
      : `<div class="detail-icon-ph">${initial}</div>`;

    const screenshots = (app.screenshots||[]).slice(0,8).map(s=>
      `<img src="${s}" alt="screenshot" loading="lazy">`).join('');

    const reviews = (revData.reviews||[]).slice(0,3).map(r=>`
      <div class="review-card">
        <div class="review-head">
          <div class="review-avatar">${(r.userName||'U')[0].toUpperCase()}</div>
          <div>
            <div class="review-name">${esc(r.userName||'User')}</div>
            <div class="review-stars">${'<i class="ti ti-star-filled"></i>'.repeat(r.score||5)}</div>
          </div>
        </div>
        <div class="review-text">${esc((r.text||'').substring(0,200))}${(r.text||'').length>200?'…':''}</div>
      </div>`).join('');

    modal.innerHTML = `
      <div class="detail-hero">
        <button class="close-modal" onclick="closeDetail()"><i class="ti ti-x"></i></button>
        <div class="detail-hero-inner">
          ${iconHtml}
          <div>
            <div class="detail-title">${esc(app.title)}</div>
            <div class="detail-dev">by ${esc(app.developer)}</div>
            <div class="detail-tags">
              <span class="detail-tag">${isFree?'Free':app.price}</span>
              <span class="detail-tag">${esc(app.genre)}</span>
              <span class="detail-tag">${esc(app.contentRating)}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="detail-body">
        <div class="stat-row">
          <div class="stat-card"><span class="stat-val">⭐ ${app.score}</span><span class="stat-lbl">Rating</span></div>
          <div class="stat-card"><span class="stat-val">${app.installs}</span><span class="stat-lbl">Installs</span></div>
          <div class="stat-card"><span class="stat-val">${app.size||'—'}</span><span class="stat-lbl">Size</span></div>
          <div class="stat-card"><span class="stat-val">${app.version||'—'}</span><span class="stat-lbl">Version</span></div>
        </div>

        <div class="dl-section">
          <button class="btn-dl-big" onclick="quickDownload(this,'${esc(app.title)}','${esc(app.url)}')">
            <i class="ti ti-download"></i> Download APK
          </button>
          <a href="${app.url}" target="_blank" rel="noopener">
            <button class="btn-play"><i class="ti ti-brand-google-play"></i> Play Store</button>
          </a>
        </div>

        <div class="detail-section-title">About this app</div>
        <div class="detail-desc clamped" id="descText">${esc(app.description||app.summary||'No description available.')}</div>
        <button class="read-more" id="readMoreBtn" onclick="toggleDesc()">Read more ▼</button>

        ${screenshots ? `
        <div class="detail-section-title">Screenshots</div>
        <div class="screenshots-row">${screenshots}</div>` : ''}

        <div class="detail-section-title">App info</div>
        <div class="info-grid">
          <div class="info-row"><div class="info-key">Developer</div><div class="info-val">${esc(app.developer)}</div></div>
          <div class="info-row"><div class="info-key">Version</div><div class="info-val">${esc(app.version||'N/A')}</div></div>
          <div class="info-row"><div class="info-key">Requires Android</div><div class="info-val">${esc(app.androidVersion||'N/A')}</div></div>
          <div class="info-row"><div class="info-key">Content Rating</div><div class="info-val">${esc(app.contentRating||'N/A')}</div></div>
          <div class="info-row"><div class="info-key">Category</div><div class="info-val">${esc(app.genre||'N/A')}</div></div>
          <div class="info-row"><div class="info-key">Price</div><div class="info-val">${esc(app.price)}</div></div>
        </div>

        ${reviews ? `
        <div class="detail-section-title">User Reviews</div>
        <div class="reviews-list">${reviews}</div>` : ''}

        <div id="similarWrap"></div>
      </div>`;

    // load similar apps
    fetch(`${API}/api/similar/${encodeURIComponent(appId)}`)
      .then(r=>r.json())
      .then(d=>{
        const el = document.getElementById('similarWrap');
        if(!el||!d.results||!d.results.length) return;
        el.innerHTML = `
          <div class="detail-section-title" style="margin-top:8px">Similar Apps</div>
          <div class="similar-grid">${d.results.map(a=>{
            const ini = (a.title||'?')[0].toUpperCase();
            const ico = a.icon
              ? `<img class="similar-icon" src="${a.icon}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="similar-icon-ph" style="display:none">${ini}</div>`
              : `<div class="similar-icon-ph">${ini}</div>`;
            return `<div class="similar-card" onclick="closeDetail();setTimeout(()=>openDetail('${esc(a.appId)}'),200)">
              ${ico}
              <div class="similar-name">${esc(a.title)}</div>
              <div class="similar-rating"><i class="ti ti-star-filled"></i>${a.score}</div>
            </div>`;
          }).join('')}</div>`;
      }).catch(()=>{});

  } catch(e) {
    modal.innerHTML = `${errorBanner(e.message)}<button class="btn-dl" style="margin:0 22px 22px;width:calc(100%-44px)" onclick="closeDetail()">Close</button>`;
  }
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if(e.target === document.getElementById('overlay')) closeDetail();
}

function toggleDesc() {
  const el  = document.getElementById('descText');
  const btn = document.getElementById('readMoreBtn');
  if(!el) return;
  el.classList.toggle('clamped');
  btn.textContent = el.classList.contains('clamped') ? 'Read more ▼' : 'Show less ▲';
}

// ── Download ───────────────────────────────────────────────────────────────────
function quickDownload(btn, name, url) {
  const orig = btn.innerHTML;
  btn.innerHTML = '<i class="ti ti-check"></i> Downloading…';
  btn.classList.add('success');
  setTimeout(()=>{ btn.innerHTML=orig; btn.classList.remove('success'); }, 2200);
  showToast(`Opening ${name}…`);
  if(url) window.open(url, '_blank', 'noopener');
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ── Skeleton loaders ───────────────────────────────────────────────────────────
function skeletonGrid(n) {
  return `<div class="app-grid">${Array(n).fill(`
    <div class="skel-card">
      <div class="skeleton skel-icon"></div>
      <div class="skeleton skel-line w80"></div>
      <div class="skeleton skel-line w60"></div>
      <div class="skeleton skel-line w40"></div>
    </div>`).join('')}</div>`;
}

function skeletonList(n) {
  return `<div class="top-list">${Array(n).fill(`
    <div class="top-item">
      <div class="skeleton" style="width:26px;height:20px;border-radius:4px"></div>
      <div class="skeleton top-icon"></div>
      <div style="flex:1"><div class="skeleton skel-line w80" style="margin-bottom:6px"></div><div class="skeleton skel-line w50"></div></div>
    </div>`).join('')}</div>`;
}

// ── Utilities ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function errorBanner(msg) {
  return `<div class="error-banner"><i class="ti ti-alert-triangle" style="font-size:18px;flex-shrink:0"></i>
    <div><strong>Could not load apps.</strong> Make sure the server is running.<br>
    <span style="font-size:12px;opacity:.75">${esc(msg)}</span></div></div>`;
}

function emptyState(title, sub) {
  return `<div class="empty-state"><i class="ti ti-search-off"></i><h3>${title}</h3><p>${sub}</p></div>`;
}
</script>

<!-- ── Footer ──────────────────────────────────────────────────────────────── -->
