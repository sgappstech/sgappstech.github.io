<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG APK Apps — Android APK Store</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#08080E;
  --surface:#0F0F1A;
  --surface2:#171724;
  --surface3:#1E1E2E;
  --border:#2A2A3E;
  --border2:#353550;
  --lime:#C8FF00;
  --lime-dim:rgba(200,255,0,.12);
  --lime-glow:rgba(200,255,0,.25);
  --cyan:#00E5FF;
  --violet:#8B5CF6;
  --pink:#FF4D8D;
  --orange:#FF6B2B;
  --text:#F0F0FF;
  --text2:#9898B8;
  --text3:#5A5A7A;
  --gold:#FFD700;
  --red:#FF3B5C;
  --green:#00FF88;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer}

/* ─── Scrollbar ─────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ─── Header ────────────────────────────────────────────────────────────── */
.header{
  background:rgba(8,8,14,.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  display:flex;align-items:center;gap:16px;
  height:60px;position:sticky;top:0;z-index:200;
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-mark{
  width:34px;height:34px;
  background:var(--lime);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  color:#000;font-size:15px;font-weight:700;
  font-family:'Space Mono',monospace;
}
.logo-text{font-size:17px;font-weight:700;letter-spacing:-.3px;color:var(--text);font-family:'Space Mono',monospace}
.logo-text span{color:var(--lime)}

.search-wrap{flex:1;max-width:480px;position:relative}
.search-wrap .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.search-wrap input{
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;
  padding:9px 38px 9px 40px;
  font-size:13.5px;outline:none;
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  font-weight:500;
  transition:border-color .15s,box-shadow .15s;
}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--lime);box-shadow:0 0 0 3px var(--lime-dim)}
.search-wrap .clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:14px;display:none;padding:4px;line-height:1}
.search-wrap input:not(:placeholder-shown)~.clear-btn{display:block}

.header-nav{display:flex;align-items:center;gap:4px;margin-left:auto}
.nav-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 13px;border-radius:5px;
  font-size:13px;font-weight:600;
  border:none;background:transparent;
  color:var(--text2);
  transition:all .12s;
  font-family:'Space Grotesk',sans-serif;
}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.primary{
  background:var(--lime);color:#000;
  padding:8px 18px;font-weight:700;
  letter-spacing:.02em;
}
.nav-btn.primary:hover{background:#D8FF20;box-shadow:0 0 20px var(--lime-glow)}

/* ─── Layout ────────────────────────────────────────────────────────────── */
.layout{display:flex;min-height:calc(100vh - 60px)}

/* ─── Sidebar ───────────────────────────────────────────────────────────── */
.sidebar{
  width:200px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:16px 8px 24px;
  position:sticky;top:60px;
  height:calc(100vh - 60px);
  overflow-y:auto;
}
.sidebar-label{
  font-size:10px;font-weight:700;
  color:var(--text3);
  text-transform:uppercase;letter-spacing:.15em;
  padding:14px 10px 6px;
  font-family:'Space Mono',monospace;
}
.sidebar-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;
  font-size:13px;cursor:pointer;
  color:var(--text2);
  border-radius:5px;
  margin-bottom:1px;
  transition:all .1s;
  font-weight:500;
  user-select:none;
}
.sidebar-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-item.active{
  background:var(--lime-dim);
  color:var(--lime);
  font-weight:700;
  border-left:2px solid var(--lime);
  padding-left:8px;
}
.sidebar-item i{font-size:15px;flex-shrink:0}
.sidebar-divider{border:none;border-top:1px solid var(--border);margin:10px 4px}

/* ─── Main ──────────────────────────────────────────────────────────────── */
.main{flex:1;min-width:0;padding:24px 28px 60px}

/* ─── Hero ──────────────────────────────────────────────────────────────── */
.hero{
  position:relative;overflow:hidden;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:40px 44px;
  margin-bottom:20px;
}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center}
.hero-eyebrow{
  font-size:10.5px;font-weight:700;
  color:var(--lime);
  text-transform:uppercase;letter-spacing:.18em;
  margin-bottom:14px;
  font-family:'Space Mono',monospace;
  display:flex;align-items:center;gap:6px;
}
.hero-eyebrow::before{content:'';width:18px;height:2px;background:var(--lime);display:inline-block}
.hero h1{
  font-size:36px;font-weight:700;
  line-height:1.1;letter-spacing:-.8px;
  margin-bottom:12px;
  color:var(--text);
}
.hero h1 em{
  font-style:normal;
  color:var(--lime);
  display:block;
}
.hero p{font-size:14px;color:var(--text2);line-height:1.75;max-width:380px;margin-bottom:24px}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.hbtn{
  display:inline-flex;align-items:center;gap:7px;
  padding:11px 20px;border-radius:5px;
  font-size:13px;font-weight:700;
  cursor:pointer;transition:all .15s;
  font-family:'Space Grotesk',sans-serif;
  letter-spacing:.02em;
}
.hbtn-solid{background:var(--lime);color:#000;border:none}
.hbtn-solid:hover{background:#D8FF20;box-shadow:0 0 24px var(--lime-glow)}
.hbtn-ghost{background:transparent;color:var(--text);border:1px solid var(--border2)}
.hbtn-ghost:hover{border-color:var(--text2);background:var(--surface2)}

.hero-stats{display:flex;flex-direction:column;gap:14px}
.hstat{
  border:1px solid var(--border);
  border-radius:6px;
  padding:16px 20px;
  background:var(--surface2);
  position:relative;overflow:hidden;
}
.hstat::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
}
.hstat:nth-child(1)::before{background:var(--lime)}
.hstat:nth-child(2)::before{background:var(--cyan)}
.hstat:nth-child(3)::before{background:var(--violet)}
.hstat:nth-child(4)::before{background:var(--orange)}
.hstat-num{
  font-size:26px;font-weight:700;
  font-family:'Space Mono',monospace;
  letter-spacing:-.5px;
  line-height:1;
  margin-bottom:3px;
}
.hstat:nth-child(1) .hstat-num{color:var(--lime)}
.hstat:nth-child(2) .hstat-num{color:var(--cyan)}
.hstat:nth-child(3) .hstat-num{color:var(--violet)}
.hstat:nth-child(4) .hstat-num{color:var(--orange)}
.hstat-lbl{font-size:12px;color:var(--text3);font-weight:500}

/* ─── Section Headers ───────────────────────────────────────────────────── */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin:28px 0 14px}
.section-hd:first-child{margin-top:0}
.section-title{
  font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:8px;
  color:var(--text);
  text-transform:uppercase;letter-spacing:.1em;
  font-family:'Space Mono',monospace;
}
.section-title i{font-size:16px;color:var(--lime)}
.count-badge{
  font-size:10px;font-weight:700;
  color:var(--text3);
  background:var(--surface2);
  padding:2px 8px;border-radius:20px;
  border:1px solid var(--border);
  font-family:'Space Mono',monospace;
  text-transform:none;letter-spacing:0;
}
.view-all{
  font-size:12px;color:var(--lime);
  cursor:pointer;border:none;background:none;
  font-family:'Space Grotesk',sans-serif;font-weight:700;
  display:flex;align-items:center;gap:3px;
  letter-spacing:.04em;text-transform:uppercase;
  transition:opacity .12s;
}
.view-all:hover{opacity:.7}

/* ─── Category Chips ────────────────────────────────────────────────────── */
.cat-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.cat-chip{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:4px;
  border:1px solid var(--border);
  font-size:12.5px;font-weight:600;
  cursor:pointer;
  background:var(--surface);color:var(--text2);
  transition:all .12s;white-space:nowrap;
}
.cat-chip:hover{border-color:var(--lime);color:var(--lime);background:var(--lime-dim)}
.cat-chip i{font-size:14px}

/* ─── App Grid ──────────────────────────────────────────────────────────── */
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.app-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;padding:14px 12px 10px;
  cursor:pointer;transition:all .18s;
  position:relative;
  overflow:hidden;
}
.app-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--lime);
  transform:scaleY(0);transition:transform .18s;
}
.app-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-2px)}
.app-card:hover::before{transform:scaleY(1)}
.app-card-icon{width:52px;height:52px;border-radius:12px;object-fit:cover;margin-bottom:10px}
.app-card-icon-ph{
  width:52px;height:52px;border-radius:12px;margin-bottom:10px;
  background:var(--surface3);
  display:flex;align-items:center;justify-content:center;
  color:var(--lime);font-size:20px;font-weight:800;
  border:1px solid var(--border);
  font-family:'Space Mono',monospace;
}
.app-card-name{font-size:12.5px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.app-card-dev{font-size:11px;color:var(--text3);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.rating{display:flex;align-items:center;gap:3px;font-size:11.5px;color:var(--text2);font-weight:600;font-family:'Space Mono',monospace}
.rating i{font-size:10px;color:var(--gold)}
.app-price{font-size:11px;font-weight:700;color:var(--green);font-family:'Space Mono',monospace}
.app-price.paid{color:var(--violet)}
.btn-dl{
  width:100%;padding:7px;
  background:transparent;color:var(--lime);
  border:1px solid var(--lime);
  border-radius:4px;
  font-size:11.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .12s;
  font-family:'Space Grotesk',sans-serif;
}
.btn-dl:hover{background:var(--lime);color:#000}
.btn-dl.success{background:var(--green);border-color:var(--green);color:#000;pointer-events:none}
.badge{position:absolute;top:8px;right:8px;font-size:9.5px;padding:2px 7px;border-radius:3px;font-weight:700;letter-spacing:.04em;font-family:'Space Mono',monospace}
.badge-free{background:var(--lime-dim);color:var(--lime);border:1px solid rgba(200,255,0,.3)}
.badge-top{background:rgba(255,107,43,.1);color:var(--orange);border:1px solid rgba(255,107,43,.3)}

/* ─── Top Charts ────────────────────────────────────────────────────────── */
.top-list{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;overflow:hidden;
}
.top-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .1s}
.top-item:hover{background:var(--surface2)}
.top-item+.top-item{border-top:1px solid var(--border)}
.top-rank{
  font-size:14px;font-weight:700;width:24px;text-align:center;
  flex-shrink:0;color:var(--text3);
  font-family:'Space Mono',monospace;
}
.top-rank.r1{color:var(--gold)}
.top-rank.r2{color:#A0A0A0}
.top-rank.r3{color:#CD8B5A}
.top-icon{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0}
.top-icon-ph{
  width:44px;height:44px;border-radius:10px;flex-shrink:0;
  background:var(--surface3);
  display:flex;align-items:center;justify-content:center;
  color:var(--lime);font-size:16px;font-weight:800;
  font-family:'Space Mono',monospace;
  border:1px solid var(--border);
}
.top-info{flex:1;min-width:0}
.top-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.top-sub{font-size:11.5px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace}
.top-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-small-dl{
  padding:6px 14px;
  background:transparent;color:var(--lime);
  border:1px solid var(--lime);
  border-radius:4px;
  font-size:11.5px;font-weight:700;
  display:flex;align-items:center;gap:4px;
  transition:all .12s;
  font-family:'Space Grotesk',sans-serif;
}
.btn-small-dl:hover{background:var(--lime);color:#000}

/* ─── Detail Modal ──────────────────────────────────────────────────────── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(12px);
  z-index:400;
  align-items:flex-start;justify-content:center;
  padding:24px;overflow-y:auto;
}
.overlay.open{display:flex}
.detail-modal{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  width:100%;max-width:680px;
  margin:auto;
  box-shadow:0 40px 120px rgba(0,0,0,.6);
  overflow:hidden;
}
.detail-hero{
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  padding:28px;position:relative;
}
.detail-hero-inner{display:flex;gap:18px;align-items:flex-start}
.detail-icon{width:80px;height:80px;border-radius:16px;object-fit:cover;flex-shrink:0;border:1px solid var(--border)}
.detail-icon-ph{
  width:80px;height:80px;border-radius:16px;flex-shrink:0;
  background:var(--surface3);
  display:flex;align-items:center;justify-content:center;
  font-size:34px;font-weight:800;
  border:1px solid var(--border);
  color:var(--lime);
  font-family:'Space Mono',monospace;
}
.detail-title{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px;color:var(--text)}
.detail-dev{font-size:12.5px;color:var(--text3);margin-bottom:10px}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap}
.detail-tag{
  font-size:10.5px;padding:3px 10px;border-radius:3px;
  background:var(--surface3);border:1px solid var(--border);
  color:var(--text2);font-weight:600;
  font-family:'Space Mono',monospace;
}
.close-modal{
  position:absolute;top:14px;right:14px;
  background:var(--surface3);border:1px solid var(--border);
  color:var(--text2);
  width:32px;height:32px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;cursor:pointer;
  transition:all .12s;
}
.close-modal:hover{border-color:var(--red);color:var(--red)}

.detail-body{padding:22px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat-card{
  text-align:center;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:12px 4px;
}
.stat-val{font-size:16px;font-weight:700;display:block;color:var(--text);font-family:'Space Mono',monospace}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:4px;display:block;text-transform:uppercase;letter-spacing:.08em;font-weight:600}

.dl-section{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-bottom:22px}
.btn-dl-big{
  padding:13px 20px;
  background:var(--lime);color:#000;
  border:none;border-radius:5px;
  font-size:14px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;width:100%;
  font-family:'Space Grotesk',sans-serif;
  letter-spacing:.02em;
}
.btn-dl-big:hover{background:#D8FF20;box-shadow:0 0 24px var(--lime-glow)}
.btn-dl-big.success{background:var(--green);pointer-events:none}
.btn-play{
  padding:13px 14px;
  background:var(--surface2);color:var(--text);
  border:1px solid var(--border);border-radius:5px;
  font-size:12.5px;font-weight:700;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:all .15s;font-family:'Space Grotesk',sans-serif;
}
.btn-play:hover{border-color:var(--text2)}

.detail-section-title{
  font-size:10px;font-weight:700;
  margin-bottom:10px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.14em;
  font-family:'Space Mono',monospace;
}
.detail-desc{font-size:13.5px;line-height:1.8;color:var(--text2);margin-bottom:20px;white-space:pre-line}
.detail-desc.clamped{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.read-more{font-size:12.5px;color:var(--lime);border:none;background:none;padding:0;margin-bottom:22px;display:block;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:20px}
.info-row{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px 13px}
.info-key{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;font-weight:700;font-family:'Space Mono',monospace}
.info-val{font-size:13px;font-weight:600;color:var(--text)}

.screenshots-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px;scrollbar-width:thin}
.screenshots-row img{height:170px;border-radius:8px;flex-shrink:0;border:1px solid var(--border);object-fit:cover}

.reviews-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.review-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
.review-head{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.review-avatar{
  width:32px;height:32px;border-radius:5px;
  background:var(--surface3);
  color:var(--lime);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;flex-shrink:0;
  font-family:'Space Mono',monospace;
}
.review-name{font-size:13px;font-weight:600;color:var(--text)}
.review-stars{display:flex;gap:1px;margin-top:2px}
.review-stars i{font-size:10px;color:var(--gold)}
.review-text{font-size:12.5px;color:var(--text2);line-height:1.65}

.similar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.similar-card{cursor:pointer;text-align:center;padding:10px 6px;border-radius:6px;transition:all .12s;border:1px solid transparent}
.similar-card:hover{background:var(--surface2);border-color:var(--border)}
.similar-icon{width:48px;height:48px;border-radius:12px;object-fit:cover;margin:0 auto 6px}
.similar-icon-ph{
  width:48px;height:48px;border-radius:12px;margin:0 auto 6px;
  background:var(--surface3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--lime);font-size:18px;font-weight:800;
  font-family:'Space Mono',monospace;
}
.similar-name{font-size:11.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.similar-rating{font-size:10.5px;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:2px;margin-top:2px;font-family:'Space Mono',monospace}
.similar-rating i{font-size:9px;color:var(--gold)}

/* ─── Skeleton ──────────────────────────────────────────────────────────── */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.8s infinite;border-radius:4px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 12px}
.skel-icon{width:52px;height:52px;border-radius:12px;margin-bottom:10px}
.skel-line{height:11px;border-radius:4px;margin-bottom:6px}
.skel-line.w80{width:80%}.skel-line.w60{width:60%}.skel-line.w40{width:40%}

/* ─── Toast ─────────────────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--surface2);border:1px solid var(--lime);
  color:var(--text);
  padding:10px 22px;border-radius:5px;
  font-size:13px;z-index:600;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  font-weight:600;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast i{color:var(--lime)}

/* ─── Empty/Error ───────────────────────────────────────────────────────── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state i{font-size:44px;display:block;margin-bottom:12px;color:var(--border)}
.empty-state h3{font-size:15px;color:var(--text2);margin-bottom:6px;font-weight:700}
.empty-state p{font-size:13px}
.error-banner{
  background:rgba(255,59,92,.08);border:1px solid rgba(255,59,92,.3);
  border-radius:6px;padding:12px 16px;
  font-size:13px;color:var(--red);
  display:flex;align-items:center;gap:10px;margin-bottom:18px;font-weight:500;
}

/* ─── Filter Pills ──────────────────────────────────────────────────────── */
.filter-pills{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
.filter-pill{
  padding:7px 16px;border-radius:4px;
  font-size:12px;font-weight:700;
  border:1px solid var(--border);
  background:var(--surface);color:var(--text2);
  cursor:pointer;transition:all .12s;
  font-family:'Space Grotesk',sans-serif;
  text-transform:uppercase;letter-spacing:.06em;
}
.filter-pill:hover{border-color:var(--text2);color:var(--text)}
.filter-pill.active{background:var(--lime-dim);border-color:var(--lime);color:var(--lime)}

/* ─── Responsive ────────────────────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:14px 16px 40px}
  .header{padding:0 14px;gap:10px}
  .logo-text{display:none}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .dl-section{grid-template-columns:1fr}
  .hero-grid{grid-template-columns:1fr}
  .hero-stats{display:none}
  .hero{padding:26px 22px}
  .hero h1{font-size:26px}
  .nav-btn:not(.primary){display:none}
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <a class="logo" href="#" onclick="goHome()">
    <div class="logo-mark">SG</div>
    <span class="logo-text">APK<span>.store</span></span>
  </a>
  <div class="search-wrap">
    <i class="ti ti-search si"></i>
    <input type="text" id="searchInput" placeholder="Search apps, games, APKs…"
           oninput="handleSearchInput()" onkeydown="if(event.key==='Enter')doSearch()">
    <button class="clear-btn ti ti-x" onclick="clearSearch()"></button>
  </div>
  <div class="header-nav">
    <button class="nav-btn" onclick="setView('top',null)"><i class="ti ti-chart-bar"></i> Charts</button>
    <a class="nav-btn" href="/blog.html" style="text-decoration:none"><i class="ti ti-news"></i> Blog</a>
    <a class="nav-btn" href="/about.html" style="text-decoration:none"><i class="ti ti-info-circle"></i> About</a>
    <button class="nav-btn primary"><i class="ti ti-download"></i> Get APK</button>
  </div>
</header>

<!-- Layout -->
<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">// discover</div>
    <div class="sidebar-item active" data-view="home" onclick="setView('home',null)"><i class="ti ti-home"></i>Home</div>
    <div class="sidebar-item" data-view="top" onclick="setView('top',null)"><i class="ti ti-chart-bar"></i>Top Charts</div>
    <div class="sidebar-item" data-view="new" onclick="setView('new',null)"><i class="ti ti-sparkles"></i>New Releases</div>
    <hr class="sidebar-divider">
    <div class="sidebar-label">// categories</div>
    <div id="catNav"></div>
  </nav>

  <main class="main" id="main"></main>
</div>

<!-- Detail Modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="detail-modal" id="detailModal"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toastMsg"></span></div>

<!-- Footer -->
<footer style="background:var(--surface);border-top:1px solid var(--border);padding:28px 24px;text-align:center">
  <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px">
    <div style="width:28px;height:28px;background:var(--lime);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:12px;color:#000;font-family:'Space Mono',monospace;font-weight:700">SG</div>
    <span style="font-weight:700;font-size:15px;color:var(--lime);font-family:'Space Mono',monospace">APK.store</span>
  </div>
  <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-bottom:14px">
    <a href="/about.html" style="font-size:12px;color:var(--text3);text-decoration:none;font-weight:600;text-transform:uppercase;letter-spacing:.08em">About</a>
    <a href="/blog.html" style="font-size:12px;color:var(--text3);text-decoration:none;font-weight:600;text-transform:uppercase;letter-spacing:.08em">Blog</a>
    <a href="/contact.html" style="font-size:12px;color:var(--text3);text-decoration:none;font-weight:600;text-transform:uppercase;letter-spacing:.08em">Contact</a>
    <a href="/privacy.html" style="font-size:12px;color:var(--text3);text-decoration:none;font-weight:600;text-transform:uppercase;letter-spacing:.08em">Privacy</a>
    <a href="/terms.html" style="font-size:12px;color:var(--text3);text-decoration:none;font-weight:600;text-transform:uppercase;letter-spacing:.08em">Terms</a>
  </div>
  <div style="font-size:11.5px;color:var(--text3);font-family:'Space Mono',monospace">© 2026 SG APK Apps — Not affiliated with Google LLC</div>
</footer>

<script>
const API = '';
let currentView = 'home';
let currentCat  = null;
let searchTimer = null;
let categories  = [];

(async function init() {
  await loadCategories();
  renderHome();
})();

async function loadCategories() {
  try {
    const r = await fetch(`${API}/api/categories`);
    const d = await r.json();
    categories = d.categories;
    const nav = document.getElementById('catNav');
    nav.innerHTML = categories.map(c => `
      <div class="sidebar-item" data-view="cat" data-cat="${c.id}" onclick="setView('cat','${c.id}')">
        <i class="ti ${c.icon}"></i>${c.label}
      </div>`).join('');
  } catch(e) { console.error(e); }
}

function setView(view, cat) {
  currentView = view;
  currentCat  = cat;
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active',
      el.dataset.view === view && (view !== 'cat' || el.dataset.cat === cat));
  });
  if(view === 'home')        renderHome();
  else if(view === 'top')    renderTopCharts('APPLICATION','TOP_FREE');
  else if(view === 'new')    renderTopCharts('APPLICATION','NEW_FREE');
  else if(cat === 'SGAPPS') renderOwnApps();
  else if(view === 'cat')    renderCategory(cat);
  window.scrollTo(0,0);
}

function goHome() { setView('home', null); return false; }

function handleSearchInput() {
  clearTimeout(searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  if(!q) { setView('home',null); return; }
  searchTimer = setTimeout(() => doSearch(), 420);
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  currentView = 'search';
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const main = document.getElementById('main');
  main.innerHTML = skeletonGrid(12);
  try {
    const r = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}&num=24`);
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    main.innerHTML = `
      <div class="section-hd">
        <div class="section-title"><i class="ti ti-search"></i>Results for "${q}" <span class="count-badge">${d.results.length}</span></div>
      </div>
      ${d.results.length === 0 ? emptyState('No apps found','Try different keywords') : ''}
      <div class="app-grid">${d.results.map(appCard).join('')}</div>`;
  } catch(e) {
    main.innerHTML = errorBanner(e.message);
  }
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  setView('home', null);
}

async function renderHome() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="hero">
      <div class="hero-grid">
        <div class="hero-content">
          <div class="hero-eyebrow">Trusted APK Source</div>
          <h1>Download Android APKs.<em>Safe &amp; Instant.</em></h1>
          <p>Live data from Google Play. Millions of free and paid apps, games, and tools — no account required.</p>
          <div class="hero-btns">
            <button class="hbtn hbtn-solid" onclick="setView('top',null)"><i class="ti ti-chart-bar"></i> Top Charts</button>
            <button class="hbtn hbtn-ghost" onclick="setView('new',null)"><i class="ti ti-sparkles"></i> New Releases</button>
          </div>
        </div>
        <div class="hero-stats">
          <div class="hstat"><div class="hstat-num">3M+</div><div class="hstat-lbl">Apps available</div></div>
          <div class="hstat"><div class="hstat-num">FREE</div><div class="hstat-lbl">No account needed</div></div>
          <div class="hstat"><div class="hstat-num">LIVE</div><div class="hstat-lbl">Real-time data</div></div>
          <div class="hstat"><div class="hstat-num">SAFE</div><div class="hstat-lbl">Play Store source</div></div>
        </div>
      </div>
    </div>

    <div class="section-hd">
      <div class="section-title"><i class="ti ti-layout-grid"></i>Categories</div>
    </div>
    <div class="cat-chips">
      ${categories.map(c=>`<div class="cat-chip" onclick="setView('cat','${c.id}')"><i class="ti ${c.icon}"></i>${c.label}</div>`).join('')}
    </div>

    <div class="section-hd" style="margin-top:32px">
      <div class="section-title"><i class="ti ti-chart-bar"></i>Top Free Apps</div>
      <button class="view-all" onclick="setView('top',null)">View all <i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="topFreeGrid">${skeletonGrid(6)}</div>

    <div class="section-hd">
      <div class="section-title"><i class="ti ti-device-gamepad-2"></i>Top Games</div>
      <button class="view-all" onclick="setView('cat','GAME')">View all <i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="topGamesGrid">${skeletonGrid(6)}</div>

    <div class="section-hd">
      <div class="section-title"><i class="ti ti-sparkles"></i>New Releases</div>
      <button class="view-all" onclick="setView('new',null)">View all <i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="newGrid">${skeletonGrid(6)}</div>
  `;

  Promise.all([
    fetchList('APPLICATION','TOP_FREE',6).then(apps => {
      const el = document.getElementById('topFreeGrid');
      if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
    }),
    fetchList('GAME','TOP_FREE',6).then(apps => {
      const el = document.getElementById('topGamesGrid');
      if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
    }),
    fetchList('APPLICATION','NEW_FREE',6).then(apps => {
      const el = document.getElementById('newGrid');
      if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
    }),
  ]).catch(console.error);
}

async function renderTopCharts(category, collection) {
  const main = document.getElementById('main');
  const colLabel = collection === 'NEW_FREE' ? 'New Releases' : 'Top Free';
  main.innerHTML = `
    <div class="section-hd">
      <div class="section-title"><i class="ti ti-chart-bar"></i>${colLabel}</div>
    </div>
    <div class="filter-pills">
      ${['TOP_FREE','TOP_PAID','NEW_FREE','NEW_PAID'].map(c=>`
        <button class="filter-pill ${c===collection?'active':''}" onclick="renderTopCharts('${category}','${c}')">
          ${c.replace('_',' ').toLowerCase().replace(/\b\w/g,x=>x.toUpperCase())}
        </button>`).join('')}
    </div>
    <div id="topListWrap">${skeletonList(20)}</div>`;
  try {
    const apps = await fetchList(category, collection, 30);
    const el = document.getElementById('topListWrap');
    if(el) el.innerHTML = `<div class="top-list">${apps.map((app,i)=>topItem(app,i)).join('')}</div>`;
  } catch(e) {
    const el = document.getElementById('topListWrap');
    if(el) el.innerHTML = errorBanner(e.message);
  }
}

async function renderCategory(catId) {
  const main = document.getElementById('main');
  const cat = categories.find(c=>c.id===catId) || { label: catId, icon:'ti-apps' };
  main.innerHTML = `
    <div class="section-hd">
      <div class="section-title"><i class="ti ${cat.icon}"></i>${cat.label}</div>
    </div>
    <div id="catGridWrap">${skeletonGrid(18)}</div>`;
  try {
    const apps = await fetchList(catId, 'TOP_FREE', 30);
    const el = document.getElementById('catGridWrap');
    if(el) el.innerHTML = `<div class="app-grid">${apps.map(appCard).join('')}</div>`;
  } catch(e) {
    const el = document.getElementById('catGridWrap');
    if(el) el.innerHTML = errorBanner(e.message);
  }
}

async function renderOwnApps() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="section-hd">
      <div class="section-title"><i class="ti ti-brand-android"></i>SG APK Apps</div>
    </div>
    <div id="ownAppsGrid">${skeletonGrid(12)}</div>`;
  try {
    const r = await fetch('/api/sgappstech');
    const d = await r.json();
    document.getElementById('ownAppsGrid').innerHTML = `<div class="app-grid">${d.results.map(appCard).join('')}</div>`;
  } catch(e) {
    document.getElementById('ownAppsGrid').innerHTML = errorBanner(e.message);
  }
}

async function fetchList(category, collection, num) {
  const r = await fetch(`${API}/api/top?category=${category}&collection=${collection}&num=${num}`);
  const d = await r.json();
  if(d.error) throw new Error(d.error);
  return d.results;
}

function appCard(app) {
  const initial = (app.title||'?')[0].toUpperCase();
  const iconHtml = app.icon
    ? `<img class="app-card-icon" src="${app.icon}" alt="${esc(app.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="app-card-icon-ph" style="display:none">${initial}</div>`
    : `<div class="app-card-icon-ph">${initial}</div>`;
  const isFree = app.price === 'Free';
  return `
    <div class="app-card" onclick="openDetail('${esc(app.appId)}')">
      ${isFree ? '<span class="badge badge-free">FREE</span>' : `<span class="badge badge-top">${app.price}</span>`}
      ${iconHtml}
      <div class="app-card-name">${esc(app.title)}</div>
      <div class="app-card-dev">${esc(app.developer)}</div>
      <div class="app-card-meta">
        <div class="rating"><i class="ti ti-star-filled"></i>${app.score}</div>
        <div class="app-price ${isFree?'':'paid'}">${app.price}</div>
      </div>
      <button class="btn-dl" onclick="event.stopPropagation();quickDownload(this,'${esc(app.title)}','${esc(app.url)}')">
        <i class="ti ti-download"></i> Download
      </button>
    </div>`;
}

function topItem(app, i) {
  const initial = (app.title||'?')[0].toUpperCase();
  const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'';
  const iconHtml = app.icon
    ? `<img class="top-icon" src="${app.icon}" alt="${esc(app.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="top-icon-ph" style="display:none">${initial}</div>`
    : `<div class="top-icon-ph">${initial}</div>`;
  return `
    <div class="top-item" onclick="openDetail('${esc(app.appId)}')">
      <span class="top-rank ${rankClass}">${i+1}</span>
      ${iconHtml}
      <div class="top-info">
        <div class="top-name">${esc(app.title)}</div>
        <div class="top-sub">
          <span><i class="ti ti-star-filled" style="color:var(--gold);font-size:10px"></i> ${app.score}</span>
          <span>·</span><span>${esc(app.genre)}</span>
          <span>·</span><span>${app.installs}</span>
        </div>
      </div>
      <div class="top-actions">
        <span style="font-size:11px;font-weight:700;color:${app.price==='Free'?'var(--green)':'var(--violet)'};font-family:'Space Mono',monospace">${app.price}</span>
        <button class="btn-small-dl" onclick="event.stopPropagation();quickDownload(this,'${esc(app.title)}','${esc(app.url)}')">
          <i class="ti ti-download"></i> APK
        </button>
      </div>
    </div>`;
}

async function openDetail(appId) {
  const overlay = document.getElementById('overlay');
  const modal   = document.getElementById('detailModal');
  overlay.classList.add('open');
  modal.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text3)">
    <i class="ti ti-loader-2" style="font-size:28px;display:block;margin-bottom:10px;animation:spin 1s linear infinite;color:var(--lime)"></i>
    Loading…
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

  try {
    const [appRes, reviewRes] = await Promise.all([
      fetch(`${API}/api/app/${encodeURIComponent(appId)}`),
      fetch(`${API}/api/reviews/${encodeURIComponent(appId)}`),
    ]);
    const app     = await appRes.json();
    const revData = await reviewRes.json().catch(()=>({reviews:[]}));
    if(app.error) throw new Error(app.error);

    const initial  = (app.title||'?')[0].toUpperCase();
    const isFree   = app.price === 'Free';
    const iconHtml = app.icon
      ? `<img class="detail-icon" src="${app.icon}" alt="${esc(app.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="detail-icon-ph" style="display:none">${initial}</div>`
      : `<div class="detail-icon-ph">${initial}</div>`;

    const screenshots = (app.screenshots||[]).slice(0,8).map(s=>
      `<img src="${s}" alt="screenshot" loading="lazy">`).join('');

    const reviews = (revData.reviews||[]).slice(0,3).map(r=>`
      <div class="review-card">
        <div class="review-head">
          <div class="review-avatar">${(r.userName||'U')[0].toUpperCase()}</div>
          <div>
            <div class="review-name">${esc(r.userName||'User')}</div>
            <div class="review-stars">${'<i class="ti ti-star-filled"></i>'.repeat(r.score||5)}</div>
          </div>
        </div>
        <div class="review-text">${esc((r.text||'').substring(0,200))}${(r.text||'').length>200?'…':''}</div>
      </div>`).join('');

    modal.innerHTML = `
      <div class="detail-hero">
        <button class="close-modal" onclick="closeDetail()"><i class="ti ti-x"></i></button>
        <div class="detail-hero-inner">
          ${iconHtml}
          <div>
            <div class="detail-title">${esc(app.title)}</div>
            <div class="detail-dev">by ${esc(app.developer)}</div>
            <div class="detail-tags">
              <span class="detail-tag">${isFree?'Free':app.price}</span>
              <span class="detail-tag">${esc(app.genre)}</span>
              <span class="detail-tag">${esc(app.contentRating)}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="detail-body">
        <div class="stat-row">
          <div class="stat-card"><span class="stat-val">⭐ ${app.score}</span><span class="stat-lbl">Rating</span></div>
          <div class="stat-card"><span class="stat-val">${app.installs}</span><span class="stat-lbl">Installs</span></div>
          <div class="stat-card"><span class="stat-val">${app.size||'—'}</span><span class="stat-lbl">Size</span></div>
          <div class="stat-card"><span class="stat-val">${app.version||'—'}</span><span class="stat-lbl">Version</span></div>
        </div>
        <div class="dl-section">
          <button class="btn-dl-big" onclick="quickDownload(this,'${esc(app.title)}','${esc(app.url)}')">
            <i class="ti ti-download"></i> Download APK
          </button>
          <a href="${app.url}" target="_blank" rel="noopener">
            <button class="btn-play"><i class="ti ti-brand-google-play"></i> Play Store</button>
          </a>
        </div>
        <div class="detail-section-title">// about</div>
        <div class="detail-desc clamped" id="descText">${esc(app.description||app.summary||'No description available.')}</div>
        <button class="read-more" id="readMoreBtn" onclick="toggleDesc()">Read more ▼</button>
        ${screenshots ? `<div class="detail-section-title">// screenshots</div><div class="screenshots-row">${screenshots}</div>` : ''}
        <div class="detail-section-title">// info</div>
        <div class="info-grid">
          <div class="info-row"><div class="info-key">Developer</div><div class="info-val">${esc(app.developer)}</div></div>
          <div class="info-row"><div class="info-key">Updated</div><div class="info-val">${esc(app.updated||'—')}</div></div>
          <div class="info-row"><div class="info-key">Android</div><div class="info-val">${esc(app.androidVersion||'—')}</div></div>
          <div class="info-row"><div class="info-key">Price</div><div class="info-val">${esc(app.price)}</div></div>
        </div>
        ${reviews ? `<div class="detail-section-title">// reviews</div><div class="reviews-list">${reviews}</div>` : ''}
        <div id="similarWrap"></div>
      </div>`;

    fetch(`${API}/api/similar/${encodeURIComponent(appId)}`)
      .then(r=>r.json())
      .then(d=>{
        const el = document.getElementById('similarWrap');
        if(!el||!d.results||!d.results.length) return;
        el.innerHTML = `
          <div class="detail-section-title" style="margin-top:8px">// similar apps</div>
          <div class="similar-grid">${d.results.map(a=>{
            const ini = (a.title||'?')[0].toUpperCase();
            const ico = a.icon
              ? `<img class="similar-icon" src="${a.icon}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="similar-icon-ph" style="display:none">${ini}</div>`
              : `<div class="similar-icon-ph">${ini}</div>`;
            return `<div class="similar-card" onclick="closeDetail();setTimeout(()=>openDetail('${esc(a.appId)}'),200)">
              ${ico}
              <div class="similar-name">${esc(a.title)}</div>
              <div class="similar-rating"><i class="ti ti-star-filled"></i>${a.score}</div>
            </div>`;
          }).join('')}</div>`;
      }).catch(()=>{});

  } catch(e) {
    modal.innerHTML = `${errorBanner(e.message)}<button class="btn-dl" style="margin:0 22px 22px;width:calc(100% - 44px)" onclick="closeDetail()">Close</button>`;
  }
}

function closeDetail() { document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e) { if(e.target===document.getElementById('overlay')) closeDetail(); }
function toggleDesc() {
  const el  = document.getElementById('descText');
  const btn = document.getElementById('readMoreBtn');
  if(!el) return;
  el.classList.toggle('clamped');
  btn.textContent = el.classList.contains('clamped') ? 'Read more ▼' : 'Show less ▲';
}

function quickDownload(btn, name, url) {
  const orig = btn.innerHTML;
  btn.innerHTML = '<i class="ti ti-check"></i> Downloading…';
  btn.classList.add('success');
  setTimeout(()=>{ btn.innerHTML=orig; btn.classList.remove('success'); }, 2200);
  showToast(`Opening ${name}…`);
  if(url) window.open(url, '_blank', 'noopener');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function skeletonGrid(n) {
  return `<div class="app-grid">${Array(n).fill(`
    <div class="skel-card">
      <div class="skeleton skel-icon"></div>
      <div class="skeleton skel-line w80"></div>
      <div class="skeleton skel-line w60"></div>
      <div class="skeleton skel-line w40"></div>
    </div>`).join('')}</div>`;
}

function skeletonList(n) {
  return `<div class="top-list">${Array(n).fill(`
    <div class="top-item">
      <div class="skeleton" style="width:24px;height:18px;border-radius:3px"></div>
      <div class="skeleton top-icon"></div>
      <div style="flex:1"><div class="skeleton skel-line w80" style="margin-bottom:6px"></div><div class="skeleton skel-line w50"></div></div>
    </div>`).join('')}</div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function errorBanner(msg) {
  return `<div class="error-banner"><i class="ti ti-alert-triangle" style="font-size:16px;flex-shrink:0"></i>
    <div><strong>Could not load apps.</strong> Make sure the server is running.<br>
    <span style="font-size:12px;opacity:.75">${esc(msg)}</span></div></div>`;
}

function emptyState(title, sub) {
  return `<div class="empty-state"><i class="ti ti-search-off"></i><h3>${title}</h3><p>${sub}</p></div>`;
}
</script>
</body>
</html>
