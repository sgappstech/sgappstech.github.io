<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>App Details</title>

<link rel="stylesheet" href="css/style.css">

<style>

.app-detail{
padding:120px 20px;
}

.app-header{
display:flex;
gap:30px;
align-items:center;
flex-wrap:wrap;
}

.app-logo{
width:140px;
height:140px;
border-radius:30px;
object-fit:cover;
}

.screenshots{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:40px;
}

.screenshots img{
width:100%;
border-radius:20px;
}

</style>

</head>

<body>

<div class="bg-blur bg1"></div>
<div class="bg-blur bg2"></div>

<section class="app-detail">

<div class="container glass">

<div class="app-header">

<img id="logo" class="app-logo">

<div>
<h1 id="title"></h1>
<p id="description"></p>
</div>

</div>

<h2 style="margin-top:40px;">
Screenshots
</h2>

<div class="screenshots">

<img id="ss1">
<img id="ss2">
<img id="ss3">

</div>

</div>

</section>

<script>

const apps = {

bubu:{
title:"Bubu Panda Stickers for WA",
logo:"images/bubu-logo.png",
description:"Cute and funny Bubu Panda sticker packs for WhatsApp users. Share emotions and fun conversations with adorable panda stickers.",
screenshots:[
"images/bubu-1.jpg",
"images/bubu-2.jpg",
"images/bubu-3.jpg"
]
},

dino:{
title:"Yellow Dino Stickers for WA",
logo:"images/dino-logo.png",
description:"A collection of funny yellow dinosaur stickers designed for WhatsApp chats.",
screenshots:[
"images/dino-1.jpg",
"images/dino-2.jpg",
"images/dino-3.jpg"
]
},

cutebaby:{
title:"Cute Baby Stickers for WA",
logo:"images/baby-logo.png",
description:"Express joy and emotions using cute baby sticker packs for WhatsApp.",
screenshots:[
"images/baby-1.jpg",
"images/baby-2.jpg",
"images/baby-3.jpg"
]
},

animatedbaby:{
title:"Animated Baby Stickers for WA",
logo:"images/animated-baby-logo.png",
description:"Animated baby stickers that make your chats more lively and expressive.",
screenshots:[
"images/animated-1.jpg",
"images/animated-2.jpg",
"images/animated-3.jpg"
]
}

};

const params = new URLSearchParams(window.location.search);
const app = params.get("app");

if(apps[app]){

document.getElementById("title").innerText =
apps[app].title;

document.getElementById("description").innerText =
apps[app].description;

document.getElementById("logo").src =
apps[app].logo;

document.getElementById("ss1").src =
apps[app].screenshots[0];

document.getElementById("ss2").src =
apps[app].screenshots[1];

document.getElementById("ss3").src =
apps[app].screenshots[2];

}

</script>

</body>
</html>
